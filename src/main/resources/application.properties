spring.application.name=thestar1
spring.datasource.url=jdbc:mysql://localhost:3306/thestar
spring.datasource.username=root
spring.datasource.password=123456

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.open-in-view=false
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl

# === 綠界 ECPay 設定（不要在 repo 放真實金鑰）===
# merchant id 可以放在 repo（若非敏感），但 hash key/iv 請改成環境變數
ecpay.merchant-id=2000132
# 將以下兩個金鑰從環境變數注入：ECPAY_HASH_KEY, ECPAY_HASH_IV
ecpay.hash-key=${ECPAY_HASH_KEY}
ecpay.hash-iv=${ECPAY_HASH_IV}
# 測試環境結帳網址（AIO）
ecpay.aio-url=https://payment-stage.ecpay.com.tw/Cashier/AioCheckOut/V5
# 回調與前端導回 URL 建議用環境變數，預設為本機方便開發
ecpay.return-url=${ECPAY_RETURN_URL:https://swerve-viewing-flock.ngrok-free.dev/thestar/ecpay/return}
# 付完款使用者瀏覽器導回的前端頁（瀏覽器自己跳，localhost 即可）
ecpay.client-back-url=${ECPAY_CLIENT_BACK_URL:http://localhost:8080/result.html}