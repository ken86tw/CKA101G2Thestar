spring.application.name=thestar1
spring.config.import=optional:file:./.env[.properties]
spring.profiles.include=google

spring.datasource.url=jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:thestar}?serverTimezone=Asia/Taipei&useUnicode=true&characterEncoding=UTF-8&allowPublicKeyRetrieval=true
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:123456}

spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.open-in-view=false
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl

# === Session ===
# \u767B\u5165\u72C0\u614B\u9592\u7F6E 30 \u5206\u9418\u5F8C\u5931\u6548\uFF0C\u6BCF\u6B21\u6709\u6548\u8ACB\u6C42\u90FD\u6703\u91CD\u65B0\u8A08\u7B97\u9592\u7F6E\u6642\u9593\u3002
server.servlet.session.timeout=30m

# === \u7DA0\u754C ECPay \u6E2C\u8A66\u74B0\u5883\uFF08\u5B98\u65B9\u516C\u958B\u6E2C\u8A66\u5546\u5E97\uFF09===
ecpay.merchant-id=2000132
ecpay.hash-key=5294y06JbISpM5x9
ecpay.hash-iv=v77hoKGq4kWxNNIS
# \u6E2C\u8A66\u74B0\u5883\u7D50\u5E33\u7DB2\u5740\uFF08AIO\uFF09
ecpay.aio-url=https://payment-stage.ecpay.com.tw/Cashier/AioCheckOut/V5
ecpay.return-url=${APP_BASE_URL:http://localhost:8080}/thestar/ecpay/return
# \u4ED8\u5B8C\u6B3E\u4F7F\u7528\u8005\u700F\u89BD\u5668\u5C0E\u56DE\u7684\u524D\u7AEF\u9801\uFF08\u700F\u89BD\u5668\u81EA\u5DF1\u8DF3\uFF0Clocalhost \u5373\u53EF\uFF09
ecpay.client-back-url=${APP_BASE_URL:http://localhost:8080}/result.html

# \u5546\u57CE\u7D50\u5E33\u7528\u7684\u7DB2\u57DF(\u53EA\u653E\u7DB2\u57DF,\u4E0D\u542B\u8DEF\u5F91;\u7A0B\u5F0F\u6703\u81EA\u5DF1\u63A5\u4E0A /shop/order/ecpay/...)
ecpay.base-url=${APP_BASE_URL:http://localhost:8080}

# \u90E8\u7F72\u6216\u4F7F\u7528 ngrok \u6642\uFF0C\u9700\u6539\u6210\u5916\u90E8\u53EF\u4EE5\u958B\u555F\u7684\u7DB2\u7AD9\u7DB2\u5740\u3002
# === \u6703\u54E1\u8A3B\u518A\u4FE1\u7BB1\u9A57\u8B49 ===
app.base-url=${APP_BASE_URL:http://localhost:8080}
app.member.password-reset-expire-minutes=30

# \u6703\u54E1\u7167\u7247\u4E0A\u50B3\u5927\u5C0F\u4E0A\u9650
spring.servlet.multipart.max-file-size=60MB
spring.servlet.multipart.max-request-size=64MB

# Gmail \u5BC4\u9A57\u8B49\u4FE1\u8A2D\u5B9A\uFF1A\u672C\u6A5F\u6E2C\u8A66\u8981\u5BC4\u4FE1\u6642\u518D\u53D6\u6D88\u8A3B\u89E3\uFF0C\u8ACB\u4E0D\u8981\u628A\u771F\u5BE6\u5BC6\u78BC\u63A8\u5230 GitHub

app.mail.gmail=${MAIL_USERNAME:}
app.mail.gmail-password=${MAIL_APP_PASSWORD:}

# === Google \u6703\u54E1\u767B\u5165 ===
# \u5C1A\u672A\u7533\u8ACB Google OAuth \u6191\u8B49\u524D\u4FDD\u6301 false\uFF0C\u5176\u4ED6\u6703\u54E1\u529F\u80FD\u4ECD\u53EF\u6B63\u5E38\u4F7F\u7528\u3002
app.google-login.enabled=false

# \u555F\u7528 Google \u767B\u5165\u6642\uFF0C\u5C07\u4E0A\u65B9\u6539\u6210 true\uFF0C\u4E26\u53D6\u6D88\u4EE5\u4E0B\u8A3B\u89E3\u5F8C\u586B\u5165 Google Cloud \u6191\u8B49\u3002
# spring.security.oauth2.client.registration.google.client-id=\u4F60\u7684_CLIENT_ID
# spring.security.oauth2.client.registration.google.client-secret=\u4F60\u7684_CLIENT_SECRET
# spring.security.oauth2.client.registration.google.scope=openid,profile,email

# === \u6703\u54E1\u767B\u5165\u5931\u6557\u9650\u5236 ===
# \u540C\u4E00\u4FE1\u7BB1\u5728 10 \u5206\u9418\u5167\u6700\u591A\u8F38\u932F 5 \u6B21\uFF0C\u7B2C 5 \u6B21\u5F8C\u9396\u5B9A 10 \u5206\u9418\u3002
app.member.login.max-failed-attempts=5
app.member.login.attempt-window-minutes=10
app.member.login.lock-minutes=10
