<!DOCTYPE html>
<!-- xmlns:th 宣告 Thymeleaf 命名空間,th: 開頭的屬性才會被伺服器處理 -->
<!-- ============================================================
     roombooking.html — 訂房站主殼(目錄頁)
     頁面內容依功能拆進 templates/roombooking/ 底下的 fragment,
     這裡用 th:replace 引入:Thymeleaf 在「伺服器端」就把各區塊
     貼回這一頁,瀏覽器拿到的仍是一份完整 HTML,Vue 照常接管 #app。
     檔案對照表(HTML / JS / CSS 同名同功能):
       booking      預訂客房(搜尋→選房→確認→付款倒數)
       orders       我的預訂(會員)
       admin-orders 後台訂單(員工)
       stay         房務管理(員工:入住/退房/住宿紀錄)
       refund       退款管理(員工)
       inventory    庫存查詢(員工)
     ============================================================ -->
<html lang="zh-Hant" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>THE STAR — Hotel &amp; Residences</title>
    <!-- Vue/Stomp/flatpickr 全部改吃專案內的複本(static/vendor/):
         之前掛 unpkg CDN,它一沒載到 Vue 整頁模板就裸奔({{ }} 直接印在畫面上)。
         放自己伺服器上就跟其他頁面一樣穩,斷網 demo 也不怕 -->
    <script src="/vendor/vue.global.prod.js"></script>
    <script src="/vendor/stomp.umd.min.js"></script>
    <!-- Font Awesome:共用導覽列的鈴鐺、會員頭像圖示需要它 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <!-- flatpickr:日期範圍選擇器套件(Booking.com 那種「點入住日→滑過去反白→點退房日」的雙月日曆)。
         三個檔案缺一不可:css=日曆外觀、js=主程式、zh-tw.js=繁中語系(把 Su Mo 變成 週日 週一) -->
    <link rel="stylesheet" href="/vendor/flatpickr.min.css">
    <script src="/vendor/flatpickr.min.js"></script>
    <script src="/vendor/flatpickr-zh-tw.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600&family=Jost:wght@300;400;500&family=Noto+Serif+TC:wght@300;400;500;600&display=swap"
          rel="stylesheet">
    <!-- common.css 是共用導覽列的樣式,要放在本頁樣式「前面」:
         兩邊都有 body、a 的全域設定,CSS 同分時後載入的贏,這樣你自己的字體、底色才不會被蓋掉 -->
    <link rel="stylesheet" href="/css/common.css">
    <!-- 本頁樣式依功能拆成四支,順序有意義(同分時後載入的贏):
         base=全頁共用底(要蓋過 common.css) → booking=訂房流程(要蓋過 flatpickr.min.css)
         → stay=房務彈窗 → inventory=庫存熱度表 -->
    <link rel="stylesheet" href="/css/roombooking/base.css">
    <link rel="stylesheet" href="/css/roombooking/booking.css">
    <link rel="stylesheet" href="/css/roombooking/stay.css">
    <link rel="stylesheet" href="/css/roombooking/inventory.css">
</head>
<body>
<!-- 共用導覽列(只給會員/訪客;員工登入時 Controller 會把 isEmployee 設成 true 就不顯示):
     1. navbar('booking', ...) 的 'booking' 讓導覽列上的「訂房」保持高亮
     2. 'site-navbar-dark room-navbar':site-navbar-dark 給尺寸排版,room-navbar 是本頁專屬配色
        (定義在 css/roombooking/base.css 檔尾),跟購物頁帶 'shop-navbar site-navbar-dark' 同一招
     3. 最後的 false = 非 Vue 模式,登入狀態由 header-auth.js 處理
     4. 用 th:block 包 th:if 是因為 th:replace 的處理順序比 th:if 早,寫在同一個標籤上會失效
     5. 放在 #app「外面」——#app 裡面歸 Vue 管,header-auth.js 直接改 DOM 會跟 Vue 打架 -->
<th:block th:if="${!isEmployee}">
    <div th:replace="~{user/common/frontNavbar :: navbar('booking', false, 'site-navbar-dark room-navbar', false)}"></div>
</th:block>

<!-- v-cloak:Vue 接管前整個 #app 先隱藏(CSS 在 base.css),
     就算 JS 載入慢或失敗,也不會把 {{ }} 原始模板攤在使用者面前 -->
<div id="app" v-cloak>

    <!-- ============ 主站（登入頁已統一：貴賓走 /login.html，員工走 Spring Security 的 /thestar/admin/login） ============ -->
    <!-- 員工專用功能列:會員/訪客只看上面的共用導覽列,不出現這條(避免雙導覽列)。
         會員的「我的預訂」走導覽列會員選單的「我的訂房預訂」(?tab=orders),訂房走導覽列的「訂房」。
         員工登入時共用導覽列不顯示,所以這條要有 logo 和身分顯示 -->
    <!-- employee.on || isEmp:isEmp 是伺服器給的旗子,第一幀就讓功能列出現;
         employee.on(員工編號)要等 /thestar/admin/me 回來,名字那格先用 v-if 藏著 -->
    <header v-if="employee.on || isEmp">
        <div class="hbar">
            <a class="logo" href="/index.html"><span class="star">✦</span><b>THE STAR</b><small>Hotel &amp;
                Residences</small></a>
            <nav class="menu">
                <button :class="{on:nav==='admin'}" @click="nav='admin';loadAdmin()">後台訂單
                </button>
                <button :class="{on:nav==='stay'}" @click="nav='stay'">房務管理</button>
                <button :class="{on:nav==='refund'}" @click="nav='refund';loadRefunds()">
                    退款管理
                </button>
                <button :class="{on:nav==='inv'}" @click="nav='inv';loadInventory()">
                    庫存查詢
                </button>
            </nav>
            <div class="hright">
                <div class="ident" v-if="employee.on">
                    <div>員工，
                        <b>{{ employee.name ? employee.name + '（#' + employee.on + '）' : '#' + employee.on }}</b></div>
                </div>
                <!-- 員工登出在後台做,這頁只給「回後台」 -->
                <a class="btn line" href="/thestar/admin/home">回後台</a>
            </div>
        </div>
    </header>

    <!-- 六個功能區塊:每個 fragment 都是一個 <section v-if="...">,
         由 Vue 依 nav 和登入身分決定哪一塊顯示(拆檔前後行為完全相同) -->
    <div th:replace="~{roombooking/booking :: section}"></div>
    <div th:replace="~{roombooking/orders :: section}"></div>
    <div th:replace="~{roombooking/admin-orders :: section}"></div>
    <div th:replace="~{roombooking/stay :: section}"></div>
    <div th:replace="~{roombooking/refund :: section}"></div>
    <div th:replace="~{roombooking/inventory :: section}"></div>

    <div class="toasts">
        <transition-group name="fade">
            <div v-for="t in toasts" :key="t.id" class="toast" :class="t.type"><b>{{ t.title }}</b><small>{{ t.msg
                }}</small></div>
        </transition-group>
    </div>
</div>

<!-- 伺服器端先告訴前端「這是不是員工」:Controller 查 session 算好的 isEmployee(本來就有,拿來隱藏導覽列),
     th:inline 會把它印成 true/false 塞進 JS——Vue 第一幀就知道身分,員工進來直接畫後台,
     不用等 /thestar/admin/me 的網路來回,就不會先閃 0.幾秒的查房首屏 -->
<script th:inline="javascript">
    window.IS_EMPLOYEE = [[${isEmployee}]];
</script>
<!-- header-auth.js:共用導覽列的大腦——問後端登入了沒,決定顯示「登入」還是會員頭像/通知鈴鐺 -->
<script src="/js/header-auth.js"></script>
<!-- 本頁 JS 依功能拆檔,順序有意義:
     common.js 要排第一(建立 RB 命名空間+共用工具),中間的功能檔不分先後,
     main.js 一定排最後(把大家的 computed/methods 合併進同一個 Vue app 再 mount) -->
<script src="/js/roombooking/common.js"></script>
<script src="/js/roombooking/booking.js"></script>
<script src="/js/roombooking/orders.js"></script>
<script src="/js/roombooking/admin-orders.js"></script>
<script src="/js/roombooking/stay.js"></script>
<script src="/js/roombooking/refund.js"></script>
<script src="/js/roombooking/inventory.js"></script>
<script src="/js/roombooking/ws.js"></script>
<script src="/js/roombooking/main.js"></script>
</body>
</html>
