<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{admin/shop_sidebar :: common-head('商品類別管理')}"></head>
<body>
    <div th:replace="~{admin/shop_sidebar :: sidebar('category')}"></div>
    <div class="main-content">
        <div th:replace="~{admin/shop_sidebar :: topbar('商品類別管理')}"></div>
        <div class="page-body">
            <div class="card p-4">
                <div class="d-flex justify-content-between align-items-center mb-3">
                    <h5 class="m-0 fw-bold">
                        <i class="fa-solid fa-tags me-2"></i>商品類別列表
                    </h5>
                    <a href="/admin/shop/category/addCategory" class="btn btn-teal">
                        <i class="fa-solid fa-plus me-1"></i>新增類別
                    </a>
                </div>
                <table class="table table-bordered table-hover align-middle">
                    <thead class="table-light">
                        <tr>
                            <th>ID</th>
                            <th>類別名稱</th>
                            <th width="160">操作</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="category : ${categoryListData}">
                            <td th:text="${category.productCategoryId}"></td>
                            <td th:text="${category.productCategoryName}" class="fw-bold"></td>
                            <td>
                                <form th:action="@{/admin/shop/category/getOne_For_Update}" method="post" style="display:inline;">
                                    <input type="hidden" name="productCategoryId" th:value="${category.productCategoryId}">
                                    <button type="submit" class="btn btn-warning btn-sm">
                                        <i class="fa-solid fa-pen"></i>
                                    </button>
                                </form>
                                <form th:action="@{/admin/shop/category/delete}" method="post" style="display:inline;"
                                      onsubmit="return confirm('確定要刪除此類別嗎？');">
                                    <input type="hidden" name="productCategoryId" th:value="${category.productCategoryId}">
                                    <button type="submit" class="btn btn-danger btn-sm">
                                        <i class="fa-solid fa-trash"></i>
                                    </button>
                                </form>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</body>
</html>
