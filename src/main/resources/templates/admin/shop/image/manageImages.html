<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{admin/shop_sidebar :: common-head('商品圖片管理')}"></head>
<body>
    <div th:replace="~{admin/shop_sidebar :: sidebar('shop')}"></div>
    <div class="main-content">
        <div th:replace="~{admin/shop_sidebar :: topbar('商品圖片管理')}"></div>
        <div class="page-body">
            <div class="card p-4">
                <h5 class="fw-bold mb-2">
                    <i class="fa-solid fa-images me-2"></i>
                    <span th:text="${productsVO.productName}"></span> 的圖片管理
                </h5>
                <a href="/admin/shop/listAllProducts" class="text-muted small mb-4 d-block">
                    ← 返回商品列表
                </a>

                <!-- 上傳表單 -->
                <div class="card p-3 mb-4" style="background:#f8fbfc;">
                    <h6 class="fw-bold mb-3">上傳新圖片</h6>
                    <form th:action="@{/admin/shop/image/upload}" method="post"
                          enctype="multipart/form-data">
                        <input type="hidden" name="productId" th:value="${productsVO.productId}">
                        <div class="d-flex gap-3 align-items-end">
                            <div>
                                <label class="form-label fw-bold">選擇圖片</label>
                                <input type="file" name="productImage" class="form-control"
                                       accept="image/*" multiple>
                            </div>
                            <button type="submit" class="btn btn-teal">
                                <i class="fa-solid fa-upload me-1"></i>上傳
                            </button>
                        </div>
                    </form>
                </div>

                <!-- 圖片列表 -->
                <h6 class="fw-bold mb-3">目前圖片（共 <span th:text="${#lists.size(imageListData)}"></span> 張）</h6>

                <div th:if="${#lists.isEmpty(imageListData)}"
                     style="text-align:center; padding:40px; color:#7a9aaa;">
                    <i class="fa-solid fa-image" style="font-size:48px; opacity:0.3;"></i>
                    <p class="mt-3">尚未上傳任何圖片</p>
                </div>

                <div style="display:grid; grid-template-columns:repeat(auto-fill, minmax(200px,1fr)); gap:16px;"
                     th:if="${!#lists.isEmpty(imageListData)}">
                    <div th:each="image : ${imageListData}"
                         th:style="${image.isCover == 1} ? 'background:#fff; border:2px solid #c9a84c; border-radius:8px; overflow:hidden; position:relative;' : 'background:#fff; border:1px solid #dce8ed; border-radius:8px; overflow:hidden; position:relative;'">

                        <!-- 封面標籤 -->
                        <div th:if="${image.isCover == 1}"
                             style="position:absolute; top:8px; left:8px; background:#c9a84c; color:#fff; font-size:11px; font-weight:700; padding:3px 10px; border-radius:20px; letter-spacing:1px; z-index:1;">
                            <i class="fa-solid fa-star me-1"></i>封面
                        </div>

                        <img th:src="@{/admin/shop/image/show/{id}(id=${image.productImageId})}"
                             style="width:100%; height:180px; object-fit:cover;">

                        <div style="padding:10px; display:flex; justify-content:space-between; align-items:center; gap:6px;">
                            <span style="font-size:12px; color:#7a9aaa;">ID: <span th:text="${image.productImageId}"></span></span>
                            <div class="d-flex gap-1">
                                <!-- 設為封面按鈕（非封面才顯示） -->
                                <form th:if="${image.isCover != 1}"
                                      th:action="@{/admin/shop/image/setCover}" method="post">
                                    <input type="hidden" name="productImageId" th:value="${image.productImageId}">
                                    <input type="hidden" name="productId" th:value="${productsVO.productId}">
                                    <button type="submit" class="btn btn-warning btn-sm"
                                            title="設為封面">
                                        <i class="fa-solid fa-star"></i>
                                    </button>
                                </form>
                                <!-- 刪除按鈕 -->
                                <form th:action="@{/admin/shop/image/delete}" method="post"
                                      onsubmit="return confirm('確定刪除此圖片？')">
                                    <input type="hidden" name="productImageId" th:value="${image.productImageId}">
                                    <input type="hidden" name="productId" th:value="${productsVO.productId}">
                                    <button type="submit" class="btn btn-danger btn-sm">
                                        <i class="fa-solid fa-trash"></i>
                                    </button>
                                </form>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
