<!DOCTYPE html>
<html lang="zh-TW" xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>問題回報後台管理</title>
<link rel="stylesheet" th:href="@{/css/reply.css}">
<link rel="stylesheet"
	href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
<link rel="stylesheet" href="/css/common.css">

<style>

/* 強制隱藏導覽列中的購物車圖示與連結 */
.shop-navbar a[href*="cart"], .shop-navbar a[href*="Cart"], .shop-navbar .fa-cart-shopping,
	.shop-navbar .fa-bag-shopping, .shop-navbar .cart-icon {
	display: none !important;
	
}

</style>

</head>
<body>

	<div
		th:replace="~{user/common/frontNavbar :: navbar('room', true, 'shop-navbar site-navbar-dark', false)}"></div>

	<div class="detail-container">

		<header class="admin-header">
			<p class="section-label">FEEDBACK MANAGEMENT</p>
			<h1>問題回報列表</h1>
		</header>

		<div class="form-container">
			<table class="feedback-table">
				<thead>
					<tr>
						<th>ID</th>
						<th>會員ID</th>
						<th>信箱</th>
						<th>主旨</th>
						<th>狀態</th>
						<th>操作</th>
					</tr>
				</thead>
				<tbody id="feedbackTableBody">
					<!-- JS 動態填入資料 -->
				</tbody>
			</table>
		</div>
	</div>

	<!-- 回覆彈窗 -->
	<div id="replyModal" class="modal" style="display: none;">
		<div class="modal-content">
			<input type="hidden" id="modalTicketId"> <input type="hidden"
				id="modalEmail">
			<h3>回覆問題</h3>
			<p id="modalContent"></p>
			<textarea id="replyContent" placeholder="輸入回覆內容..."
				style="width: 100%; height: 100px; margin: 10px 0;"></textarea>
			<button onclick="submitReply()" class="btn">送出回覆</button>
			<button onclick="closeModal()" class="btn ghost">取消</button>
		</div>
	</div>

	<!-- 請確認路徑是否正確指向剛剛更新的 reply.js -->
	<script th:src="@{/js/reply.js}"></script>
	<script th:src="@{/js/header-auth.js}"></script>
</body>
</html>
