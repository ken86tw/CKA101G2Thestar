<!DOCTYPE html>
<html lang="zh-TW" xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title th:text="${roomTypeVO.roomTypeId == null ? '新增房型' : '編輯房型'}">表單</title>
<link rel="stylesheet" th:href="@{/css/roomTypeManage.css}">
<style>
/* 針對表單頁的細部調整 */
.form-container {
	max-width: 600px;
	margin: 50px auto;
	background: white;
	padding: 40px;
	border: 1px solid #e0dcd5;
}

.form-group {
	margin-bottom: 25px;
}

.form-group label {
	display: block;
	margin-bottom: 8px;
	color: #888;
	font-size: 13px;
	letter-spacing: 1px;
}

.form-group input, .form-group textarea, .form-group select {
	width: 100%;
	padding: 12px;
	border: 1px solid #e0dcd5;
	box-sizing: border-box;
	font-family: inherit;
	color: #4a4a4a;
}

.btn-row {
	margin-top: 40px;
	display: flex;
	gap: 20px;
}
</style>
<!-- header -->
<style>
:root {
	--serif: 'Cormorant Garamond', 'Noto Serif TC', serif;
	--sans: 'Jost', 'Noto Serif TC', system-ui, sans-serif;
	--cream: #f6f2ea;
	--paper: #fbf9f4;
	--ink: #23211c;
	--soft: #5b564c;
	--muted: #9b9486;
	--gold: #9c7c4f;
	--gold-d: #80623a;
	--line: #e4ddd0;
	--hero:
		url('https://images.unsplash.com/photo-1566073771259-6a8506099945?auto=format&fit=crop&w=2000&q=80');
}

* {
	box-sizing: border-box
}

html, body {
	margin: 0
}

body {
	font-family: var(--sans);
	background: var(--cream);
	color: var(--ink);
	font-weight: 300;
	font-size: 15px;
	line-height: 1.7
}

h1, h2, h3 {
	font-family: var(--serif);
	font-weight: 500;
	margin: 0;
	letter-spacing: .5px
}

.ser {
	font-family: var(--serif)
}

.up {
	text-transform: uppercase;
	letter-spacing: 3px;
	font-size: 11px;
	font-weight: 400
}

a {
	color: inherit;
	text-decoration: none
}

/* ===== buttons ===== */
.btn {
	display: inline-flex;
	align-items: center;
	justify-content: center;
	gap: 8px;
	border: 0;
	cursor: pointer;
	background: var(--gold);
	color: #fff;
	font-family: var(--sans);
	font-size: 11.5px;
	letter-spacing: 2.5px;
	text-transform: uppercase;
	padding: 14px 30px;
	transition: .3s
}

.btn:hover {
	background: var(--gold-d)
}

.btn:disabled {
	opacity: .4;
	cursor: not-allowed
}

.btn.ghost {
	background: transparent;
	border: 1px solid var(--ink);
	color: var(--ink)
}

.btn.ghost:hover {
	background: var(--ink);
	color: #fff
}

.btn.line {
	background: transparent;
	border: 1px solid var(--gold);
	color: var(--gold);
	padding: 9px 18px
}

.btn.line:hover {
	background: var(--gold);
	color: #fff
}

.btn.sm {
	padding: 9px 18px;
	font-size: 10.5px;
	letter-spacing: 2px
}

.btn.danger {
	background: transparent;
	border: 1px solid #a85b50;
	color: #a85b50
}

.btn.danger:hover {
	background: #a85b50;
	color: #fff
}

.btn.block {
	width: 100%
}
/* ===== header ===== */
header {
	position: sticky;
	top: 0;
	z-index: 30;
	background: rgba(251, 249, 244, .92);
	backdrop-filter: blur(8px);
	border-bottom: 1px solid var(--line)
}

.hbar {
	max-width: 1180px;
	margin: 0 auto;
	display: flex;
	align-items: center;
	gap: 20px;
	padding: 18px 30px
}

.logo {
	display: flex;
	flex-direction: column;
	line-height: 1
}

.logo .star {
	font-size: 15px;
	color: var(--gold);
	letter-spacing: 6px
}

.logo b {
	font-family: var(--serif);
	font-size: 22px;
	letter-spacing: 5px;
	font-weight: 500
}

.logo small {
	font-size: 9px;
	letter-spacing: 4px;
	color: var(--muted);
	text-transform: uppercase;
	margin-top: 3px
}

nav.menu {
	display: flex;
	gap: 30px;
	margin-left: 30px;
	flex: 1
}

nav.menu button {
	background: 0;
	border: 0;
	cursor: pointer;
	font-family: var(--sans);
	font-size: 12px;
	letter-spacing: 2px;
	text-transform: uppercase;
	color: var(--soft);
	padding: 6px 0;
	position: relative;
	transition: .25s
}

nav.menu button:hover {
	color: var(--ink)
}

nav.menu button.on {
	color: var(--ink)
}

nav.menu button.on::after {
	content: "";
	position: absolute;
	left: 0;
	right: 0;
	bottom: -2px;
	height: 1px;
	background: var(--gold)
}

.hright {
	display: flex;
	align-items: center;
	gap: 16px
}

.ident {
	font-size: 10.5px;
	letter-spacing: 1.5px;
	color: var(--muted);
	text-transform: uppercase;
	text-align: right
}

.ident b {
	color: var(--gold);
	font-weight: 400
}
</style>
</head>
<body>

	<header>
		<div class="hbar">
			<div class="logo">
				<span class="star">✦</span><b>THE STAR</b><small>Hotel &amp;
					Residences</small>
			</div>
		</div>
	</header>

	<div class="container">
		<header class="admin-header">
			<p class="section-label">ROOM MANAGEMENT</p>
			<h1 th:text="${roomTypeVO.roomTypeId == null ? '新增房型' : '編輯房型'}">表單</h1>
		</header>

		<form
			th:action="@{${roomTypeVO.roomTypeId == null ? '/roomtype/insert' : '/roomtype/update'}}"
			th:object="${roomTypeVO}" method="post" enctype="multipart/form-data"
			class="form-container">

			<input type="hidden" th:field="*{roomTypeId}" />

			<div class="form-group">
				<label>房型名稱</label> <input type="text" th:field="*{roomTypeName}"
					required />
			</div>

			<div class="form-group">
				<label>房型圖片</label> <input type="file" id="imageInput"
					name="imageFile" accept="image/*" />
			</div>

			<div class="form-group" th:if="${roomTypeVO.roomTypeId != null}">
				<label>目前圖片</label> <img id="previewImg"
					th:src="@{'/roomtypephoto/display/' + ${roomTypeVO.roomTypeId}}"
					style="max-width: 100%; height: auto; border-radius: 4px; display: block;"
					alt="目前圖片" />
			</div>

			<div class="form-group">
				<label>庫存數量</label> <input type="number"
					th:field="*{roomTypeAmount}" min="0" required />
			</div>

			<div class="form-group">
				<label>房型說明</label>
				<textarea th:field="*{roomTypeContent}" rows="5"></textarea>
			</div>

			<div class="form-group">
				<label>價格 (NT$)</label> <input type="number"
					th:field="*{roomTypePrice}" required />
			</div>

			<div class="form-group">
				<label>狀態</label> <select th:field="*{roomTypeStatus}">
					<option value="true">啟用</option>
					<option value="false">未啟用</option>
				</select>
			</div>

			<div class="btn-row">
				<button type="submit" class="btn" style="flex: 2;">儲存變更</button>
				<a th:href="@{/roomtype/manage}" class="btn ghost"
					style="flex: 1; text-align: center;">返回</a>
			</div>
		</form>
	</div>

	<script th:src="@{/js/roomTypeManage.js}"></script>
</body>
</html>
