<!DOCTYPE html>
<html lang="zh-TW" xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title th:text="${roomTypeVO.roomTypeId == null ? '新增房型' : '編輯房型'}">房型管理</title>
<link rel="stylesheet" th:href="@{/css/roomTypeManage.css}">
<style>
.form-container {
	max-width: 600px;
	margin: 20px auto 50px auto;
	background: white;
	padding: 40px;
	border: 1px solid #e0dcd5;
}

.photo-container {
	max-width: 600px;
	margin: 50px auto 0 auto;
	background: white;
	padding: 20px 40px;
	border: 1px solid #e0dcd5;
	border-bottom: none;
}

.form-group {
	margin-bottom: 25px;
}

.form-group label {
	display: block;
	margin-bottom: 8px;
	color: #888;
	font-size: 13px;
	letter-spacing: 1px;
	font-weight: bold;
}

.form-group input, .form-group textarea, .form-group select {
	width: 100%;
	padding: 12px;
	border: 1px solid #e0dcd5;
	box-sizing: border-box;
}

.photo-grid {
	display: flex;
	flex-wrap: wrap;
	gap: 15px;
	margin-top: 10px;
}

.photo-item {
	text-align: center;
	border: 1px solid #eee;
	padding: 5px;
	border-radius: 4px;
}

.photo-item img {
	width: 120px;
	height: 120px;
	object-fit: cover;
	display: block;
	border-radius: 4px;
	margin-bottom: 5px;
}

.preview-img {
	width: 120px;
	height: 120px;
	object-fit: cover;
	margin: 5px;
	border: 1px solid #ddd;
	border-radius: 4px;
}

.backend-error {
	color: #a85b50;
	padding: 15px;
	border: 1px solid #a85b50;
	margin-bottom: 25px;
	background: #fff5f5;
	font-size: 14px;
	font-weight: bold;
}

.admin-header {
	max-width: 600px; /* 與表單容器一致 */
    margin: 40px auto; /* 置中並保持間距 */
    text-align: center;
    padding: 40px;
    background: #fbf9f4;
    border: 1px solid #e0dcd5;
	position: static;
}

.admin-header h1 {
	font-family: 'Cormorant Garamond', 'Noto Serif TC', serif; /* 確保字體一致 */
    font-size: 32px;
    margin: 10px 0 0 0;
    font-weight: 500;
    color: #23211c; /* 強制設定與頁面主色調一致 */
}

.section-label {
	color: #9c7c4f;
    font-size: 11px;
    letter-spacing: 4px;
    text-transform: uppercase;
    margin: 0;
    font-family: 'Jost', 'Noto Serif TC', sans-serif;
}
</style>
</head>
<body>

	<div class="container">

		<header class="admin-header">
			<p class="section-label"
				th:text="${roomTypeVO.roomTypeId == null ? 'CREATE ROOM TYPE' : 'EDIT ROOM TYPE'}">
				ROOM CONFIGURATION</p>
			<h1 th:text="${roomTypeVO.roomTypeId == null ? '新增房型' : '修改房型資訊'}">
				房型管理</h1>
		</header>

		<div th:if="${successMessage}" class="alert alert-success"
			th:text="${successMessage}"></div>
		<div th:if="${errorMessage}" class="alert alert-danger"
			th:text="${errorMessage}"></div>

		<!-- 圖片管理區塊 -->
		<div class="photo-container" th:if="${roomTypeVO.roomTypeId != null}">
			<div class="form-group" style="margin-bottom: 0;">
				<label>目前房型圖片</label>
				<div class="photo-grid">
					<div class="photo-item" th:each="photo : ${photoList}">
						<img
							th:src="@{'/roomtypephoto/display/photo/' + ${photo.roomTypePhotoId} + '?t=' + ${#dates.createNow().getTime()}}"
							alt="房型圖片">
						<form
							th:action="@{'/roomtypephoto/delete/' + ${photo.roomTypePhotoId}}"
							method="post">
							<input type="hidden" name="roomTypeId"
								th:value="${roomTypeVO.roomTypeId}">
							<button type="submit" class="delete-btn"
								style="color: #a85b50; border: none; background: none; cursor: pointer;">刪除</button>
						</form>
					</div>
				</div>
			</div>
		</div>

		<!-- 主要表單 -->
		<form
			th:action="@{${roomTypeVO.roomTypeId == null ? '/roomtype/insert' : '/roomtype/update'}}"
			th:object="${roomTypeVO}" method="post" enctype="multipart/form-data"
			class="form-container">

			<div th:if="${errorMessage}" class="backend-error"
				th:text="${errorMessage}"></div>
			<input type="hidden" th:field="*{roomTypeId}" />

			<div class="form-group">
				<label>房型名稱</label> <input type="text" th:field="*{roomTypeName}"
					maxlength="20" required />
			</div>

			<div class="form-group">
				<label>上傳圖片</label>
				<!-- 將原本的 input 改為這樣：隱藏它，但給它一個 id -->
				<input type="file" id="imageFilesInput" name="imageFiles"
					accept="image/*" multiple style="display: none;" />

				<!-- 新增一個按鈕來觸發 input -->
				<button type="button" id="uploadBtn" class="btn"
					style="background: #fbf9f4; border: 1px solid #e0dcd5; cursor: pointer; padding: 10px 20px;">
					<i class="fa-solid fa-cloud-arrow-up"></i> 選擇圖片 (可多選)
				</button>

				<!-- 預覽區 -->
				<div id="previewContainer" class="photo-grid"
					style="margin-top: 15px;"></div>
			</div>


			<div class="form-group">
				<label>庫存數量 (系統自動統計)</label>

				<!-- 1. 給使用者看的唯讀欄位 (顯示最新統計值) -->
				<!-- 注意：這裡判斷一下，如果是新增頁面顯示0，編輯頁面顯示 minAllowedAmount -->
				<input type="number"
					th:value="${minAllowedAmount != null ? minAllowedAmount : 0}"
					readonly
					style="background-color: #f8f9fa; border: 1px solid #dee2e6; color: #6c757d; cursor: not-allowed; padding: 12px; box-sizing: border-box; width: 100%;" />

				<!-- 2. 重要：隱藏欄位 (確保表單送出時，amount 欄位有值，對應 VO 屬性) -->
				<!-- 如果是編輯頁，就把現有的 amount 帶進去；如果是新增頁，預設為 0 -->
				<input type="hidden" th:field="*{roomTypeAmount}" />

				<!-- 3. 提示訊息 -->
				<small id="amountHint"
					style="color: #9c7c4f; font-size: 12px; font-weight: bold;">
					由系統自動統計 (目前系統中該房型已建立 [[${minAllowedAmount != null ?
					minAllowedAmount : 0}]] 間房間) </small>
			</div>

			<div class="form-group">
				<label>房型說明</label>
				<textarea name="roomTypeContent" th:field="*{roomTypeContent}"
					style="resize: none; width: 100%; height: 200px;">
				</textarea>
				<span th:if="${#fields.hasErrors('roomTypeContent')}"
					th:errors="*{roomTypeContent}"
					style="color: #a85b50; font-size: 12px; margin-top: 5px; display: block;"></span>
			</div>

			<div class="form-group">
				<label>價格 (NT$)</label> <input type="number"
					th:field="*{roomTypePrice}" min="1" required />
			</div>

			<div class="form-group">
				<label>狀態</label> <select th:field="*{roomTypeStatus}">
					<option value="true">啟用</option>
					<option value="false">未啟用</option>
				</select>
			</div>

			<div class="btn-row">
				<button type="submit" class="btn">儲存變更</button>
				<a th:href="@{/roomtype/manage}" class="btn ghost">返回列表</a>
			</div>
		</form>
	</div>

	<!-- 引入 JS -->
	<script th:src="@{/js/roomTypeForm.js}"></script>
</body>
</html>
