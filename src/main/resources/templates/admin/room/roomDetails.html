<!DOCTYPE html>
<html lang="zh-TW" xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>房間詳情 | THE STAR</title>
<link rel="stylesheet" th:href="@{/css/roomManage.css}">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<style>
:root {
    --serif: 'Cormorant Garamond', 'Noto Serif TC', serif;
    --sans: 'Jost', 'Noto Serif TC', system-ui, sans-serif;
    --ink: #23211c;
    --gold: #9c7c4f;
    --line: #e0dcd5;
}

body {
    font-family: var(--sans);
    background: #f6f2ea;
    color: var(--ink);
    font-size: 15px;
    line-height: 1.7;
    margin: 0;
}

.container {
    max-width: 600px;
    margin: 40px auto;
    background: transparent;
    padding: 0;
}

.admin-header {
    text-align: center;
    margin-bottom: 40px;
    background: transparent !important;
    border: none !important;
}

.admin-header h1 { font-family: var(--serif); margin-bottom: 10px; }
.section-label { color: var(--gold); font-size: 11px; letter-spacing: 4px; }

/* 唯讀卡片樣式 */
.admin-content {
    background: white;
    padding: 40px;
    border: 1px solid var(--line);
}

.detail-group { margin-bottom: 25px; }
.detail-label {
    display: block;
    margin-bottom: 8px;
    color: #888;
    font-size: 13px;
    letter-spacing: 1px;
    font-weight: bold;
    text-transform: uppercase;
}

.detail-value {
    padding: 12px;
    background: #fbfbfb;
    border: 1px solid var(--line);
    color: #333;
    font-weight: 500;
    
    /* 統一按鈕樣式 */
.btn {
    display: inline-block;
    padding: 10px 25px;
    background: #9c7c4f; /* 修改頁的 gold 顏色 */
    color: white !important;
    text-decoration: none !important; /* 移除底線 */
    border: 1px solid #9c7c4f;
    cursor: pointer;
    transition: all 0.3s ease;
}

.btn:hover {
    background: #7d633f; /* Hover 時變深一點 */
    color: white !important;
}

.btn.ghost {
    background: transparent;
    color: #9c7c4f !important;
    border: 1px solid #9c7c4f;
}

.btn.ghost:hover {
    background: #9c7c4f;
    color: white !important;
}

}
</style>
</head>

<body>
    <div class="container">
        <header class="admin-header">
            <h1>房間詳細資料</h1>
            <p class="section-label">ROOM DETAILS</p>
        </header>

        <main class="admin-content" th:if="${roomVO}">
            <div class="detail-group">
                <span class="detail-label">房間編號</span>
                <div class="detail-value" th:text="${roomVO.roomId}"></div>
            </div>

            <div class="detail-group">
                <span class="detail-label">房型資訊</span>
                <div class="detail-value" th:text="'(' + ${roomVO.roomTypeId} + ') ' + (${roomVO.roomTypeName != null ? roomVO.roomTypeName : '未知房型'})"></div>
            </div>

            <div class="detail-group">
                <span class="detail-label">房間狀態</span>
                <div class="detail-value" th:text="'(' + ${roomVO.roomStatus} + ') ' + 
                    (${roomVO.roomStatus == 0 ? '空房' : 
                      (roomVO.roomStatus == 1 ? '已入住' : '待清潔')})"></div>
            </div>

            <div class="detail-group">
                <span class="detail-label">啟用情況</span>
                <div class="detail-value" th:text="${roomVO.roomSwitchStatus ? '(1) 已上架' : '(0) 未上架'}"></div>
            </div>

            <div class="form-actions" style="margin-top: 30px;">
                <a th:href="@{/room/manage}" class="btn ghost">返回列表</a>
            </div>
        </main>
    </div>
</body>
</html>
