<!DOCTYPE html>
<html lang="zh-TW" xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>房務管理 | THE STAR</title>
<link rel="stylesheet" th:href="@{/css/roomTypeManage.css}">
<link rel="stylesheet"
	href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<style>
:root {
	--serif: 'Cormorant Garamond', 'Noto Serif TC', serif;
	--sans: 'Jost', 'Noto Serif TC', system-ui, sans-serif;
	--cream: #f6f2ea;
	--paper: #fbf9f4;
	--ink: #23211c;
	--soft: #5b564c;
	--muted: #9b9486;
	--gold: #9c7c4f;
	--gold-d: #80623a;
	--line: #e4ddd0;
	--hero:
		url('https://images.unsplash.com/photo-1566073771259-6a8506099945?auto=format&fit=crop&w=2000&q=80');
}

* {
	box-sizing: border-box
}

header {
	position: relative; /* 或 sticky */
	z-index: 1000; /* 設定一個夠大的數值，確保它在最上層 */
}

/* 2. 確保 .admin-header 的 z-index 低於 header */
.admin-header {
	position: relative;
	z-index: 1; /* 讓它的層級小於 header */
}

html, body {
	margin: 0
}

body {
	font-family: var(--sans);
	background: var(--cream);
	color: var(--ink);
	font-weight: 300;
	font-size: 15px;
	line-height: 1.7
}

h1, h2, h3 {
	font-family: var(--serif);
	font-weight: 500;
	margin: 0;
	letter-spacing: .5px
}

.ser {
	font-family: var(--serif)
}

.up {
	text-transform: uppercase;
	letter-spacing: 3px;
	font-size: 11px;
	font-weight: 400
}

a {
	color: inherit;
	text-decoration: none
}

.msg-box {
	margin-bottom: 20px;
	padding: 15px;
	text-align: center;
	border-radius: 4px;
	border: 1px solid;
}

.msg-box.success {
	background-color: #f6f2ea;
	border-color: #9c7c4f;
	color: #9c7c4f;
}

.msg-box.error {
	background-color: #fff0f0;
	border-color: #d9534f;
	color: #d9534f;
}

.menu {
    display: flex;
    gap: 20px; /* 增加按鈕之間的間距 */
    align-items: center;
}

/* 針對新按鈕的專屬樣式 */
.btn-home {
    padding: 8px 16px;
    background-color: #f6f2ea; /* 與背景色一致，或改用 var(--ink) */
    border: 1px solid #9c7c4f; /* 金色邊框，呼應你的設計 */
    color: #9c7c4f;
    font-size: 13px;
    text-transform: uppercase;
    letter-spacing: 1px;
    transition: all 0.3s ease;
}

.btn-home:hover {
    background-color: #9c7c4f; /* 滑鼠移上去變成金色底 */
    color: #ffffff;            /* 文字變白色 */
}

.hbar {
    display: flex;
    justify-content: space-between; /* LOGO 在左，右側區塊在右 */
    align-items: center;
    padding: 20px 40px; /* 根據你的實際頁面間距調整 */
}

/* 右側容器，包含選單與按鈕 */
.header-right {
    display: flex;
    align-items: center;
    gap: 30px; /* 控制選單與按鈕之間的間距 */
}

</style>

</head>
<body>
	<header>
	
	
		<div class="hbar">
			<a th:href="@{/thestar/admin/home}" class="logo"> <span
				class="star">✦</span><b>THE STAR</b><small>Hotel &amp;
					Residences</small>
			</a>
			<nav class="menu">
				<a th:href="@{/room/manage}">房間管理</a> <a
					th:href="@{/roomtype/manage}">房型管理</a>
			</nav>
			<a th:href="@{/thestar/admin/home}" class="btn-home">後台首頁</a>
		</div>
	</header>

	<div class="container">
		<header class="admin-header">
			<p class="section-label">HOUSEKEEPING</p>
			<h1>房型管理</h1>
			<p class="section-desc">管理房型資訊 · 新增 · 修改 · 刪除</p>
		</header>

		<main class="admin-content">

			<!-- 錯誤訊息顯示區塊 (新增這一段) -->
			<div th:if="${errorMessage}"
				style="margin-bottom: 20px; padding: 15px; background-color: #fff0f0; border: 1px solid #d9534f; color: #d9534f; text-align: center; border-radius: 4px;">
				<i class="fa-solid fa-circle-exclamation"></i> <span
					th:text="${errorMessage}"></span>
			</div>


			<!--   新增後顯示成功訊息 -->
			<div th:if="${successMessage}"
				style="margin-bottom: 20px; padding: 15px; background-color: #f6f2ea; border: 1px solid #9c7c4f; color: #9c7c4f; text-align: center; border-radius: 4px;">
				<i class="fa-solid fa-check-circle"></i> <span
					th:text="${successMessage}"></span>
			</div>


			<div class="toolbar">
				<div class="admin-stats">
					目前共有 <span th:text="${totalCount}">0</span> 種房型， 房間總庫存 <span
						th:text="${totalAmount}">0</span> 間。
					<!-- 加入剩餘庫存顯示 -->
					<span style="color: #9c7c4f; font-weight: bold;"> (可新建房間剩:
						[[${remaining}]] 間) </span>
				</div>
				<a th:href="@{/roomtype/add}" class="btn btn-primary"> <i
					class="fa-solid fa-plus"></i> 新增房型
				</a>
			</div>

			<table class="room-table">
				<thead>
					<tr>
						<th>圖片</th>
						<th>房型名稱</th>
						<th>數量</th>
						<th>價格</th>
						<th>狀態</th>
						<th>操作</th>
					</tr>
				</thead>
				<tbody>
					<tr th:each="room : ${rooms}">
						<td><img
							th:src="@{/roomtypephoto/display/room/{id}(id=${room.roomTypeId})}"
							class="table-img" alt="房型圖片"></td>
						<td th:text="${room.roomTypeName}"></td>

						<td style="text-align: center; font-weight: bold; color: #9c7c4f;">
							<i class="fa-solid fa-bed" style="margin-right: 5px;"></i> <!-- 修改後的寫法：從 Controller 傳入的 roomCountsMap 取得對應 ID 的數量 -->
							<span th:text="${roomCountsMap.get(room.roomTypeId)}">0</span> 間
						</td>

						<td th:text="'NT$ ' + ${room.roomTypePrice}"></td>
						<td><span class="status-badge"
							th:text="${room.roomTypeStatus} ? '已啟用' : '未啟用'"></span></td>

						<td class="actions">
							<!-- 修改按鈕 --> <a
							th:href="@{'/roomtype/edit/' + ${room.roomTypeId}}"
							class="btn-icon" title="修改"> <i class="fa-solid fa-pen"></i>

						</a> <!-- 新增：檢視按鈕 --> <a
							th:href="@{'/roomtype/details/' + ${room.roomTypeId}}"
							class="btn-icon" title="檢視詳情"> <i class="fa-solid fa-eye"></i>

						</a> <!-- 刪除按鈕 (保留原本的 form 結構) -->
							<form th:action="@{'/roomtype/delete/' + ${room.roomTypeId}}"
								method="post" style="display: inline;">
								<button type="submit" class="btn-icon" title="刪除"
									onclick="return confirm('確定刪除？')">
									<i class="fa-solid fa-trash"></i>
								</button>
							</form>
						</td>
					</tr>
				</tbody>
			</table>
		</main>
	</div>

	<script th:src="@{/js/roomTypeManage.js}"></script>
</body>
</html>
