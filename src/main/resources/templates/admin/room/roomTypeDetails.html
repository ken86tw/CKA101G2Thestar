<!DOCTYPE html>
<html lang="zh-TW" xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>房型詳細資料 | THE STAR</title>
<link rel="stylesheet" th:href="@{/css/roomTypeManage.css}">
<style>
.form-container {
	max-width: 600px;
	margin: 40px auto 50px auto;
	background: white;
	padding: 40px;
	border: 1px solid #e0dcd5;
}

.photo-container {
	max-width: 600px;
	margin: 50px auto 0 auto;
	background: white;
	padding: 20px 40px;
	border: 1px solid #e0dcd5;
	border-bottom: none;
}

.content-display {
	width: 100%;
	padding: 12px;
	border: 1px solid #e0dcd5;
	background-color: #f9f9f9;
	color: #555;
	box-sizing: border-box; /* 確保寬度計算包含 padding */
	min-height: 150px; /* 給它一個高度 */
	white-space: pre-wrap; /* 關鍵：讓資料庫中的換行符號能顯示出來 */
	font-size: 14px; /* 設定與 input 接近的字體大小 */
	font-family: inherit; /* 確保字體與輸入框一致 */
}

.form-group {
	margin-bottom: 25px;
}

.form-group label {
	display: block;
	margin-bottom: 8px;
	color: #888;
	font-size: 13px;
	letter-spacing: 1px;
	font-weight: bold;
}

.form-group input, .form-group .content-display, .form-group select {
	width: 100%;
	padding: 12px;
	border: 1px solid #e0dcd5;
	background-color: #f9f9f9;
	color: #555;
	box-sizing: border-box;
	font-size: 14px; /* 設定與編輯頁輸入框相同的字體大小 */
}

.photo-grid {
	display: flex;
	flex-wrap: wrap;
	gap: 15px;
	margin-top: 10px;
}

.photo-item img {
	width: 120px;
	height: 120px;
	object-fit: cover;
	border-radius: 4px;
	border: 1px solid #eee;
}

.admin-header {
	max-width: 600px;
	margin: 40px auto;
	text-align: center;
	padding: 40px;
	background: #fbf9f4;
	border: 1px solid #e0dcd5;
	position: static;
}

.admin-header h1 {
	font-family: 'Cormorant Garamond', 'Noto Serif TC', serif;
	font-size: 32px;
	margin: 10px 0 0 0;
	font-weight: 500;
	color: #23211c;
}

.section-label {
	color: #9c7c4f;
	font-size: 11px;
	letter-spacing: 4px;
	text-transform: uppercase;
	margin: 0;
	font-family: 'Jost', 'Noto Serif TC', sans-serif;
}

.admin-content {
    max-width: 600px; /* 這裡要跟 header 的 max-width 一樣 */
    margin: 0 auto 50px auto; /* 置中 */
    background: white;
    padding: 40px;
    border: 1px solid #e0dcd5;
}

</style>
</head>
<body>

	<div class="container">

		<header class="admin-header">
			<p class="section-label">ROOM TYPE DETAILS</p>
			<h1>房型詳細資料</h1>
		</header>

		<!-- 圖片顯示區塊 -->
		<div class="photo-container">
			<div class="form-group" style="margin-bottom: 0;">
				<label>房型圖片預覽</label>
				<div class="photo-grid">
					<div class="photo-item" th:each="photo : ${photoList}">
						<img
							th:src="@{'/roomtypephoto/display/photo/' + ${photo.roomTypePhotoId}}"
							alt="房型圖片">
					</div>
					<div th:if="${#lists.isEmpty(photoList)}"
						style="color: #999; padding: 10px;">目前無圖片</div>
				</div>
			</div>
		</div>

		<!-- 唯讀資料表單 -->
		<div class="form-container">
			<div class="form-group">
				<label>房型編號</label> <input type="text"
					th:value="${roomTypeVO.roomTypeId}" disabled />
			</div>

			<div class="form-group">
				<label>房型名稱</label> <input type="text"
					th:value="${roomTypeVO.roomTypeName}" disabled />
			</div>

			<div class="form-group">
				<label>庫存數量</label> <input type="text"
					th:value="${roomTypeVO.roomTypeAmount}" disabled />
			</div>

			<div class="form-group">
				<label>房型說明</label>
				<div class="content-display" th:text="${roomTypeVO.roomTypeContent}"></div>
			</div>

			<div class="form-group">
				<label>價格 (NT$)</label> <input type="text"
					th:value="${roomTypeVO.roomTypePrice}" disabled />
			</div>


			<div class="form-group">
				<label>房型狀態</label> <input type="text"
					th:value="${roomTypeVO.roomTypeStatus ? '啟用' : '未啟用'}" disabled />
			</div>

			<div class="btn-row">
				<!-- 注意這裡：因為是房型管理，返回路徑應為 /roomtype/manage -->
				<a th:href="@{/roomtype/manage}" class="btn ghost">返回列表</a>
			</div>
		</div>
	</div>

</body>
</html>
