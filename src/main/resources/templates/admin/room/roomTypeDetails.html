<!DOCTYPE html>
<html lang="zh-TW" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>房型詳細資訊</title>
    <link rel="stylesheet" th:href="@{/css/roomTypeManage.css}">
    
    <style>
        .detail-container { max-width: 600px; margin: 50px auto; background: white; padding: 40px; border: 1px solid #e0dcd5; }
        .detail-group { margin-bottom: 25px; }
        .detail-group label { display: block; margin-bottom: 8px; color: #888; font-size: 13px; }
        .detail-value { padding: 10px; border-bottom: 1px solid #eee; color: #4a4a4a; }
        img { max-width: 100%; border-radius: 4px; }
        
        .btn.ghost {
        display: inline-block;
        padding: 12px;
        border: 1px solid #23211c; /* 黑色邊框 */
        background-color: transparent; /* 平常為透明/白色底 */
        color: #23211c !important; /* 平常為黑色文字 */
        text-decoration: none;
        text-align: center;
        transition: all 0.3s ease;
    }

    /* 移上去時變成黑底白字 */
    .btn.ghost:hover {
        background-color: #23211c;
        color: #ffffff !important;
    }

    </style>
</head>
<body>
    <div class="container">
        <div class="detail-container">
            <h1>房型詳細檢視</h1>
            <div class="detail-group">
                <label>房型名稱</label>
                <div class="detail-value" th:text="${roomTypeVO.roomTypeName}"></div>
            </div>
            <div class="detail-group">
                <label>圖片</label>
                <img th:src="@{'/roomtypephoto/display/' + ${roomTypeVO.roomTypeId}}" alt="房型圖片">
            </div>
            <div class="detail-group">
                <label>庫存數量</label>
                <div class="detail-value" th:text="${roomTypeVO.roomTypeAmount}"></div>
            </div>
            <div class="detail-group">
                <label>價格 (NT$)</label>
                <div class="detail-value" th:text="${roomTypeVO.roomTypePrice}"></div>
            </div>
            <div class="detail-group">
                <label>房型說明</label>
                <div class="detail-value" style="white-space: pre-line;" th:text="${roomTypeVO.roomTypeContent}"></div>
            </div>
				<a th:href="@{/roomtype/manage}" class="btn ghost">返回列表</a>
        </div>
    </div>
</body>
</html>
