<!DOCTYPE html>
<html lang="zh-TW" xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>房間設定 | THE STAR</title>
<link rel="stylesheet" th:href="@{/css/roomManage.css}">
</head>
<body>

	<div class="container">
		<header class="admin-header">
			<h1 th:text="${roomVO.roomId == null} ? '新增房間' : '修改房間資訊'">房間設定</h1>
			<p class="section-label">ROOM CONFIGURATION</p>
		</header>

		<main class="admin-content">
			<form th:action="@{/room/update}" th:object="${roomVO}" method="post">

				<input type="hidden" th:field="*{roomId}"
					th:if="${roomVO.roomId != null}" />

				<div class="form-group">
					<label>房間編號</label>
					<!-- 如果是修改模式，顯示文字並使用隱藏欄位傳送值 -->
					<span th:if="${roomVO.roomId != null}" th:text="${roomVO.roomId}"></span>
					<input type="hidden" th:if="${roomVO.roomId != null}"
						th:field="*{roomId}" />

					<!-- 如果是新增模式，顯示輸入框 -->
					<input type="text" th:if="${roomVO.roomId == null}"
						th:field="*{roomId}" pattern="\d{1,4}" maxlength="4" required />
				</div>

				<div class="form-group">
					<label>選擇房型</label> <select th:field="*{roomTypeId}" required>
						<option value="" disabled selected>請選擇房型</option>
						<!-- 增加防呆選項 -->
						<option th:each="type : ${roomTypeList}"
							th:value="${type.roomTypeId}" th:text="${type.roomTypeName}"></option>
					</select>
				</div>


				<div class="form-group">
					<label>是否上架</label> <input type="checkbox"
						th:field="*{roomSwitchStatus}" />
				</div>

				<div class="form-actions" style="margin-top: 30px;">
					<button type="submit" class="btn">儲存設定</button>
					<a th:href="@{/room/manage}" class="btn ghost">取消</a>
				</div>
			</form>
		</main>
	</div>
</body>
</html>
