<!DOCTYPE html>
<html lang="zh-TW" xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>房間設定 | THE STAR</title>
<link rel="stylesheet" th:href="@{/css/roomManage.css}">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

	<div class="container">
		<header class="admin-header">
			<h1 th:text="${roomVO.roomId == null} ? '新增房間' : '修改房間資訊'">房間設定</h1>
			<p class="section-label">ROOM CONFIGURATION</p>
		</header>

		<main class="admin-content">
			<!-- 加入 onsubmit 攔截，確保送出前做最終檢查 -->
			<form id="roomForm" onsubmit="return validateForm()"
				th:action="${roomVO.roomId == null} ? @{/room/insert} : @{/room/update}"
				th:object="${roomVO}" method="post">

				<div class="form-group">
					<label>房間編號</label>
					
					<!-- 修改模式 -->
					<th:block th:if="${roomVO.roomId != null}">
						<span th:text="${roomVO.roomId}"></span>
						<input type="hidden" th:field="*{roomId}" />
					</th:block>

					<!-- 新增模式 -->
					<th:block th:if="${roomVO.roomId == null}">
						<input type="text" id="roomIdInput" th:field="*{roomId}"
							placeholder="請輸入 3 位數字" required oninput="validateRoom(this)"
							maxlength="3" />
						
						<!-- 錯誤提示區塊 -->
						<div id="roomError" style="color: #d9534f; font-size: 0.85em; margin-top: 5px; display: none;">
							<i class="fa-solid fa-circle-exclamation"></i> <span id="errorText"></span>
						</div>
					</th:block>
				</div>

				<div class="form-group">
					<label>選擇房型</label> 
					<select th:field="*{roomTypeId}" required>
						<option value="" disabled selected>請選擇房型</option>
						<option th:each="type : ${roomTypeList}"
							th:value="${type.roomTypeId}" th:text="${type.roomTypeName}"></option>
					</select>
				</div>

				<div class="form-group">
					<label>是否上架</label> <input type="checkbox" th:field="*{roomSwitchStatus}" />
				</div>

				<div class="form-actions" style="margin-top: 30px;">
					<button type="submit" class="btn">儲存設定</button>
					<a th:href="@{/room/manage}" class="btn ghost">取消</a>
				</div>
			</form>
		</main>
	</div>

	<script th:inline="javascript">
		const existingIds = /*[[${existingRoomIds}]]*/[];

		function validateRoom(input) {
			input.value = input.value.replace(/[^0-9]/g, ''); // 過濾非數字

			const errorDiv = document.getElementById('roomError');
			const errorText = document.getElementById('errorText');
			const val = input.value;
			const numVal = parseInt(val);

			if (val === "") {
				errorDiv.style.display = 'none';
			} else if (val.length < 3) {
				errorText.innerText = "請輸入 3 位數字";
				errorDiv.style.display = 'block';
			} else if (existingIds.includes(numVal)) {
				errorText.innerText = "輸入到重複編號，請重新輸入";
				errorDiv.style.display = 'block';
			} else {
				errorDiv.style.display = 'none';
			}
		}

		function validateForm() {
			const input = document.getElementById('roomIdInput');
			if (!input) return true; // 如果是修改模式，沒有 input，直接通過

			const val = input.value;
			const numVal = parseInt(val);

			// 最後防線：檢查長度與重複
			if (val.length !== 3 || existingIds.includes(numVal)) {
				alert("房間編號錯誤，請檢查後再儲存！");
				return false; // 阻止表單送出
			}
			return true; // 通過檢查
		}
	</script>
</body>
</html>
