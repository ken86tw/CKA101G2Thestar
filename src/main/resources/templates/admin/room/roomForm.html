<!DOCTYPE html>
<html lang="zh-TW" xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title th:text="${roomVO.roomId == null} ? '新增房間' : '修改房間資訊'">房間設定</title>
<link rel="stylesheet" th:href="@{/css/roomManage.css}">
<link rel="stylesheet"
	href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<style>
:root {
	--serif: 'Cormorant Garamond', 'Noto Serif TC', serif;
	--sans: 'Jost', 'Noto Serif TC', system-ui, sans-serif;
	--ink: #23211c;
	--gold: #9c7c4f;
	--line: #e0dcd5;
	--cream: #f6f2ea;
	--bg-header: #fbf9f4;
}

body {
	font-family: var(--sans);
	background: var(--cream);
	color: var(--ink);
	margin: 0;
	padding: 40px 0;
}

.container {
	max-width: 600px;
	margin: 0 auto;
}

/* Header 風格 */
.admin-header {
	text-align: center;
	margin-bottom: 40px;
	padding: 30px;
	background: var(--bg-header);
	position: static;
}

.admin-header h1 {
	font-family: var(--serif);
	font-size: 32px;
	margin: 0 0 10px 0;
	font-weight: 500;
}

.section-label {
	color: var(--gold);
	font-size: 11px;
	letter-spacing: 4px;
	text-transform: uppercase;
	margin: 0;
}

/* 內容區塊 */
.admin-content {
	background: white;
	padding: 40px;
	border: 1px solid var(--line);
}

/* 表單群組 (與詳情頁的 .detail-group 風格統一) */
.form-group {
	margin-bottom: 25px;
}

.form-group label {
	display: block;
	margin-bottom: 8px; /* 同步為 8px */
	color: #888;
	font-size: 13px;
	font-weight: 500;
}

.form-group input, .form-group select {
	width: 100%;
	padding: 12px; /* 同步為 12px */
	border: 1px solid var(--line);
	background: #fbfbfb; /* 同步背景色 */
	font-size: 14px;
	color: #333;
	box-sizing: border-box;
}

.id-display {
	padding: 12px;
	border: 1px solid var(--line);
	background: #fbfbfb;
	display: block;
	font-size: 14px;
	color: #333;
}

/* 按鈕樣式 (同步) */
.btn-row {
	margin-top: 30px;
}

.btn {
	display: inline-block;
	padding: 12px 30px;
	text-decoration: none;
	font-size: 14px;
	border: 1px solid var(--ink);
	background: transparent;
	color: var(--ink);
	cursor: pointer;
	transition: 0.3s;
}

.btn:hover {
	background: var(--ink);
	color: white;
}
</style>
</head>

<body>
	<div class="container">
		<header class="admin-header">
			<p class="section-label"
				th:text="${roomVO.roomId == null ? 'CREATE ROOM' : 'EDIT ROOM'}">ROOM
				CONFIGURATION</p>
			<h1 th:text="${roomVO.roomId == null ? '新增房間' : '修改房間資訊'}">房間設定</h1>
		</header>

		<main class="admin-content">

			<div th:if="${errorMessage}"
				style="background-color: #f8d7da; color: #721c24; padding: 15px; margin-bottom: 20px; border: 1px solid #f5c6cb; border-radius: 4px;">
				<i class="fa-solid fa-circle-exclamation"></i> <span
					th:text="${errorMessage}"></span>
			</div>

			<!-- 確保表單標籤正確包覆所有內容 -->
			<form id="roomForm" onsubmit="return validateForm()"
				th:action="${roomVO.roomId == null} ? @{/room/insert} : @{/room/update}"
				th:object="${roomVO}" method="post">

				<!-- 房間編號 -->
				<div class="form-group">
					<label>房間編號</label>
					<th:block th:if="${roomVO.roomId != null}">
						<span class="id-display" th:text="${roomVO.roomId}"></span>
						<input type="hidden" th:field="*{roomId}" />
					</th:block>
					<th:block th:if="${roomVO.roomId == null}">
						<input type="text" id="roomIdInput" th:field="*{roomId}"
							placeholder="請輸入 3 位數字" required oninput="validateRoom(this)"
							maxlength="3" />
						<div id="roomError"
							style="color: #a85b50; font-size: 12px; margin-top: 5px; display: none;">
							<i class="fa-solid fa-circle-exclamation"></i> <span
								id="errorText"></span>
						</div>
					</th:block>
				</div>

				<!-- 選擇房型 -->
				<div class="form-group">
					<label>選擇房型</label> <select th:field="*{roomTypeId}" required>
						<option value="" disabled selected>請選擇房型</option>
						<option th:each="type : ${roomTypeList}"
							th:value="${type.roomTypeId}" th:text="${type.roomTypeName}"></option>
					</select>
				</div>

				<!-- 狀態 -->
				<div class="form-group">
					<label>啟用狀態</label>
					<!-- 若已入住，自動 disable 下拉選單 -->
					<select th:field="*{roomSwitchStatus}"
						th:disabled="${roomVO.roomStatus == 1}">
						<option value="false">未上架</option>
						<option value="true">已上架</option>
					</select>

					<p th:if="${roomVO.roomStatus == 1}"
						style="color: #a85b50; font-size: 12px; margin-top: 5px;">
						<i class="fa-solid fa-circle-exclamation"></i>
						目前為「已入住」狀態，無法修改啟用狀態。
					</p>
				</div>

				<div class="btn-row">
					<button type="submit" class="btn">儲存設定</button>
					<a th:href="@{/room/manage}" class="btn">返回列表</a>
				</div>
			</form>
		</main>
	</div>

	<script th:inline="javascript">
		const existingIds = /*[[${existingRoomIds}]]*/[];
		function validateRoom(input) {
			input.value = input.value.replace(/[^0-9]/g, '');
			const errorDiv = document.getElementById('roomError');
			const errorText = document.getElementById('errorText');
			const val = input.value;
			const numVal = parseInt(val);
			if (val === "") {
				errorDiv.style.display = 'none';
			} else if (val.length < 3) {
				errorText.innerText = "請輸入 3 位數字";
				errorDiv.style.display = 'block';
			} else if (existingIds.includes(numVal)) {
				errorText.innerText = "輸入到重複編號，請重新輸入";
				errorDiv.style.display = 'block';
			} else {
				errorDiv.style.display = 'none';
			}
		}
		function validateForm() {
			const input = document.getElementById('roomIdInput');
			if (!input)
				return true; // 如果是編輯模式 (沒有 roomIdInput)，直接允許提交

			const val = input.value;
			// 嚴格檢查：長度必須為 3 且不能重複
			if (val.length !== 3 || existingIds.includes(parseInt(val))) {
				alert("房間編號錯誤，請檢查後再儲存！"); // 這行會強制彈出 alert
				return false; // 阻擋表單提交
			}
			return true;
		}

		function submitDelete(roomId, isSwitchOn) {
			if (isSwitchOn === true) {
				alert("刪除失敗：該房間目前為『已上架』狀態，請先下架後再執行刪除。");
				return;
			}

			if (confirm("確定要刪除此房間嗎？此動作無法復原。")) {
				// 設定隱藏表單的 ID 並提交
				document.getElementById('deleteRoomId').value = roomId;
				document.getElementById('deleteForm').submit();
			}
		}
	</script>
</body>
</html>
