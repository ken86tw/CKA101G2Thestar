<!DOCTYPE html>
<html lang="zh-TW" xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>房間設定 | THE STAR</title>
<link rel="stylesheet" th:href="@{/css/roomManage.css}">
</head>
<body>

	<div class="container">
		<header class="admin-header">
			<h1 th:text="${roomVO.roomId == null} ? '新增房間' : '修改房間資訊'">房間設定</h1>
			<p class="section-label">ROOM CONFIGURATION</p>
		</header>

		<main class="admin-content">
			<form th:action="@{/room/save}" th:object="${roomVO}" method="post">

				<input type="hidden" th:field="*{roomId}"
					th:if="${roomVO.roomId != null}" />

				<div class="form-group">
					<label>房間編號</label> <input type="text" th:field="*{roomId}"
						th:disabled="${roomVO.roomId != null}" pattern="\d{1,4}"
						maxlength="4"
						oninput="this.value = this.value.replace(/[^0-9]/g, '');"
						placeholder="請輸入1-4位數編號" required />
				</div>

				<div class="form-group">
					<label>選擇房型</label> <select th:field="*{roomTypeVO.roomTypeId}">
						<option th:each="type : ${roomTypeList}"
							th:value="${type.roomTypeId}" th:text="${type.roomTypeName}"></option>
					</select>
				</div>

				<div class="form-group">
					<label>房間狀態</label> <select th:field="*{roomStatus}">
						<option value="0">空房</option>
						<option value="1">已入住</option>
						<option value="2">待清潔</option>
					</select>
				</div>

				<div class="form-group">
					<label>是否上架</label> <input type="checkbox"
						th:field="*{roomSwitchStatus}" />
				</div>

				<div class="form-actions" style="margin-top: 30px;">
					<button type="submit" class="btn">儲存設定</button>
					<a th:href="@{/room/manage}" class="btn ghost">取消</a>
				</div>
			</form>
		</main>
	</div>
</body>
</html>
