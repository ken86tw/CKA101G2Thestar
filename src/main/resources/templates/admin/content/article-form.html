<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{admin/content/parts :: head(${mode == 'add'} ? '新增文章 - The Star Hotel' : '編輯文章 - The Star Hotel')}"></head>
<body class="admin-body">
<div class="admin-frame">
    <div th:replace="~{admin/content/parts :: topbar}"></div>
    <aside th:replace="~{admin/content/parts :: sidebar('article')}"></aside>
    <main class="admin-main">
        <div class="admin-heading">
            <div>
                <h1 th:text="${mode == 'add'} ? '新增文章' : '編輯文章'"></h1>
                <p>編輯前台文章標題、分類與內容。</p>
            </div>
        </div>
        <form class="admin-card admin-form" th:object="${article}"
              th:action="${mode == 'add'} ? @{/thestar/admin/content/article/add} : @{'/thestar/admin/content/article/edit/' + ${article.articleId}}"
              method="post">
            <div class="admin-form-grid">
                <div class="field">
                    <label for="title">標題</label>
                    <input id="title" th:field="*{title}" required>
                </div>
                <div class="field">
                    <label for="category">分類</label>
                    <input id="category" th:field="*{category}" required>
                </div>
            </div>
            <div class="field">
                <label for="content">內容</label>
                <textarea id="content" class="admin-textarea" th:field="*{content}" required></textarea>
            </div>
            <div class="field">
                <label for="status">狀態</label>
                <select id="status" th:field="*{status}">
                    <option value="1">發布</option>
                    <option value="0">下架</option>
                </select>
            </div>
            <div class="form-actions">
                <button class="admin-button" type="submit">儲存</button>
                <a class="admin-button line" th:href="@{/thestar/admin/content/article}">取消</a>
            </div>
        </form>
    </main>
</div>
</body>
</html>
