<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{admin/content/parts :: head('最新消息管理 - The Star Hotel')}"></head>
<body class="admin-body">
<div class="admin-frame">
    <div th:replace="~{admin/content/parts :: topbar}"></div>
    <aside th:replace="~{admin/content/parts :: sidebar('news')}"></aside>
    <main class="admin-main">
        <div class="admin-heading">
            <div>
                <h1>最新消息管理</h1>
                <p>管理公告、活動消息與系統維護通知。</p>
            </div>
            <a th:href="@{/thestar/admin/content/news/add}" class="admin-button">+ 新增消息</a>
        </div>
        <p class="admin-message" th:if="${message}" th:text="${message}"></p>
        <p class="admin-message error" th:if="${error}" th:text="${error}"></p>
        <div class="admin-card">
            <table class="admin-table">
                <thead><tr><th>#</th><th>標題</th><th>瀏覽</th><th>狀態</th><th>建立時間</th><th>更新時間</th><th>操作</th></tr></thead>
                <tbody>
                <tr th:each="news : ${newsList}">
                    <td><span class="oid" th:text="${news.newsId}"></span></td>
                    <td th:text="${news.title}"></td>
                    <td th:text="${news.viewCount}"></td>
                    <td>
                        <span th:if="${news.status == 1}" class="admin-badge on">發布</span>
                        <span th:unless="${news.status == 1}" class="admin-badge off">下架</span>
                    </td>
                    <td th:text="${#temporals.format(news.createdAt, 'yyyy/MM/dd HH:mm')}"></td>
                    <td th:text="${#temporals.format(news.updatedAt, 'yyyy/MM/dd HH:mm')}"></td>
                    <td class="admin-actions">
                        <a class="admin-button line sm" th:href="@{'/thestar/admin/content/news/edit/' + ${news.newsId}}">編輯</a>
                        <form th:action="@{'/thestar/admin/content/news/' + ${news.newsId} + '/toggle-status'}" method="post">
                            <input type="hidden" name="published" th:value="${news.status == 1} ? 'false' : 'true'">
                            <button class="admin-button danger sm" type="submit" th:text="${news.status == 1} ? '下架' : '發布'"></button>
                        </form>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>
    </main>
</div>
</body>
</html>
