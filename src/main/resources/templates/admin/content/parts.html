<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:fragment="head(title)">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${title}"></title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600&family=Jost:wght@300;400;500&family=Noto+Serif+TC:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/admin.css}">
    <script th:src="@{/js/theme.js}"></script>
</head>
<body>
<div class="admin-topbar" th:fragment="topbar">
    <button class="theme-toggle" onclick="toggleTheme()" title="切換深色 / 淺色模式">🌓</button>
    <div class="admin-brand">
        <b>The Star</b>
        <span class="admin-pill">Admin</span>
    </div>
    <div class="admin-user">
        <span class="admin-avatar" th:text="${#strings.substring(currentEmployeeName, 0, 1)}"></span>
        <span th:text="${currentEmployeeName}"></span>
        <form th:action="@{/thestar/admin/logout}" method="post">
            <button type="submit" class="admin-button line sm">登出</button>
        </form>
    </div>
</div>
<aside class="admin-sidebar" th:fragment="sidebar(active)">
    <div class="side-section">
        <a class="side-link" th:classappend="${active == 'home'} ? ' active'" th:href="@{/thestar/admin/home}"><span class="side-icon">⌂</span>控制中心</a>
    </div>
    <div class="side-section">
        <p class="side-title">用戶管理</p>
        <a class="side-link" th:href="@{/thestar/admin/employee/list}"><span class="side-icon">◎</span>員工管理</a>
        <a class="side-link" th:if="${isSuperAdmin}" th:href="@{/thestar/admin/employee/list}"><span class="side-icon">◇</span>權限管理</a>
    </div>
    <div class="side-section">
        <p class="side-title">營運管理</p>
        <a class="side-link" th:href="@{/}"><span class="side-icon">□</span>訂單管理</a>
        <a class="side-link" th:href="@{/}"><span class="side-icon">▣</span>房務管理</a>
    </div>
    <div class="side-section">
        <p class="side-title">內容管理</p>
        <a class="side-link" th:classappend="${active == 'news'} ? ' active'" th:href="@{/thestar/admin/content/news}"><span class="side-icon">▤</span>最新消息管理</a>
        <a class="side-link" th:classappend="${active == 'article'} ? ' active'" th:href="@{/thestar/admin/content/article}"><span class="side-icon">✎</span>文章管理</a>
        <a class="side-link" th:classappend="${active == 'review'} ? ' active'" th:href="@{/thestar/admin/content/review}"><span class="side-icon">☰</span>文章評論管理</a>
    </div>
</aside>
</body>
</html>
