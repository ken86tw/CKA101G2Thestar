<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>員工登入 - The Star Hotel</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600&family=Jost:wght@300;400;500&family=Noto+Serif+TC:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/admin.css}">
</head>
<body>
<div class="gate">
    <div class="visual">
        <div class="cap">
            <div class="up">The Star · Since 2026</div>
            <h1>Arrive as a guest,<br>leave as family.</h1>
        </div>
    </div>
    <div class="form">
        <div class="mark">
            <div class="star">✦</div>
            <h2>THE STAR</h2>
            <p>Hotel &amp; Residences</p>
        </div>

        <p class="error-msg" th:if="${param.error}">帳號或密碼錯誤，或帳號已停用</p>
        <p class="success-msg" th:if="${param.logout}">已登出</p>

        <form th:action="@{/thestar/admin/login}" method="post">
            <div class="field">
                <label for="email">Employee Email</label>
                <input id="email" type="email" name="email" required autofocus>
            </div>

            <div class="field">
                <label for="password">Password</label>
                <input id="password" type="password" name="password" required>
            </div>

            <button type="submit" class="btn block">進入後台</button>
            <p class="hint login-hint">員工後台 · 訂單 · 房務 · 權限管理</p>
        </form>
    </div>
</div>
</body>
</html>
