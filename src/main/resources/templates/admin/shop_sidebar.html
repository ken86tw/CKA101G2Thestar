<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:fragment="common-head(title)">
<meta charset="UTF-8">
<title th:text="${title}">The Star 購物後台</title>
<link rel="stylesheet"
	href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
<link rel="stylesheet"
	href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link
	href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600&family=Jost:wght@300;400;500&family=Noto+Serif+TC:wght@300;400;500;600&family=Noto+Sans+TC:wght@300;400;500;700&display=swap"
	rel="stylesheet">
<style>
* {
	font-family: 'Jost', 'Noto Sans TC', sans-serif;
}

body {
	display: flex;
	min-height: 100vh;
	background-color: #f5f0e8;
	overflow-x: hidden;
}

/* ===== Sidebar ===== */
.sidebar {
	width: 260px;
	background-color: #ede8df;
	color: #3a3226;
	min-height: 100vh;
	display: flex;
	flex-direction: column;
	border-right: 1px solid #ddd5c5;
}

.sidebar .logo {
	padding: 28px 20px;
	text-align: center;
	background-color: #e5ddd0;
	border-bottom: 1px solid #ddd5c5;
}

.sidebar .logo-en {
	font-family: 'Cormorant Garamond', serif;
	font-style: italic;
	font-size: 1.6rem;
	color: #9c7c4f;
	letter-spacing: 2px;
	margin-bottom: 4px;
}

.sidebar .logo-title {
	font-family: 'Noto Serif TC', serif;
	font-size: 1rem;
	font-weight: 600;
	color: #3a3226;
	letter-spacing: 4px;
	margin: 0;
}

.sidebar .logo-subtitle {
	font-size: 11px;
	color: #8a7a65;
	letter-spacing: 1px;
	margin-top: 6px;
}

.sidebar .nav-section {
	padding: 16px 12px 4px;
	font-size: 10px;
	color: #9a8a75;
	letter-spacing: 2px;
	text-transform: uppercase;
	font-family: 'Jost', sans-serif;
}

.sidebar .nav-link {
	color: #5a4e3e;
	padding: 11px 16px;
	display: flex;
	align-items: center;
	gap: 12px;
	transition: all 0.2s;
	border-radius: 6px;
	margin: 2px 8px;
	font-size: 14px;
}

.sidebar .nav-link:hover {
	background-color: rgba(156, 124, 79, 0.12);
	color: #7a5c30;
	text-decoration: none;
	border-radius: 20px;
}

.sidebar .nav-link.active {
	background-color: #e0d8cc;
	color: #7a5c30;
	text-decoration: none;
	border-left: 0;
	font-weight: 500;
	border-radius: 20px;
	margin: 2px 8px;
}

.sidebar .nav-link i {
	width: 16px;
	text-align: center;
	opacity: 0.7;
}

/* sidebar 下拉選單 */
.sidebar .nav-dropdown-btn {
	color: #5a4e3e;
	padding: 11px 16px;
	display: flex;
	align-items: center;
	gap: 12px;
	transition: all 0.2s;
	border-radius: 6px;
	margin: 2px 8px;
	font-size: 14px;
	background: transparent;
	border: 0;
	width: calc(100% - 16px);
	cursor: pointer;
	text-align: left;
}

.sidebar .nav-dropdown-btn:hover {
	background-color: rgba(156, 124, 79, 0.12);
	color: #7a5c30;
	border-radius: 20px;
}

.sidebar .nav-dropdown-btn.active {
	background-color: #e0d8cc;
	color: #7a5c30;
	border-left: 0;
	font-weight: 500;
	border-radius: 8px;
}

.sidebar .nav-dropdown-menu {
	display: none;
	padding-left: 12px;
}

.sidebar .nav-dropdown-menu.show {
	display: block;
}

.sidebar .nav-dropdown-menu .nav-link {
	font-size: 13px;
	padding: 8px 16px;
	color: #7a6e5a;
}

.sidebar .nav-dropdown-menu .nav-link:hover {
	color: #7a5c30;
}

.sidebar-footer {
	padding: 16px;
	border-top: 1px solid #ddd5c5;
	margin-top: auto;
}

.sidebar-footer a {
	color: #8a7a65;
	font-size: 13px;
	text-decoration: none;
	display: flex;
	align-items: center;
	gap: 8px;
}

.sidebar-footer a:hover {
	color: #5a4e3e;
}

/* ===== Main content ===== */
.main-content {
	flex: 1;
	display: flex;
	flex-direction: column;
	min-width: 0;
}

.top-navbar {
	background-color: #f8f4ee;
	padding: 16px 32px;
	border-bottom: 1px solid #e8e0d0;
	display: flex;
	justify-content: space-between;
	align-items: center;
}

.top-navbar h4 {
	font-family: 'Noto Serif TC', serif;
	color: #3a3226;
	font-size: 1.1rem;
	letter-spacing: 2px;
	font-weight: 500;
}

.page-body {
	padding: 32px;
	flex: 1;
	background-color: #f5f0e8;
}

/* ===== Card ===== */
.card {
	border: 1px solid #e8e0d0;
	box-shadow: 0 2px 12px rgba(42, 36, 25, 0.06);
	border-radius: 8px;
	background: #fffdf8;
}

/* ===== Table ===== */
.table thead {
	background-color: #f0e8d8;
}

.table thead th {
	color: #6a5030;
	font-size: 13px;
	font-weight: 600;
	border-color: #e8e0d0;
	letter-spacing: 1px;
}

.table tbody tr {
	border-color: #ede5d5;
}

.table tbody tr:hover {
	background-color: #faf5ec;
}

/* ===== Buttons ===== */
.btn-gold {
	background-color: #c9a84c;
	color: #fff;
	border: 0;
}

.btn-gold:hover {
	background-color: #a8893a;
	color: #fff;
}

.btn-outline-gold {
	background: transparent;
	color: #9c7c4f;
	border: 1px solid #9c7c4f;
}

.btn-outline-gold:hover {
	background-color: #9c7c4f;
	color: #fff;
}

.btn-teal {
	background-color: #3a8a7a;
	color: #fff;
	border: 0;
}

.btn-teal:hover {
	background-color: #2d6d5f;
	color: #fff;
}
</style>
</head>
<body>

	<div th:fragment="sidebar(activePage)" class="sidebar">
		<div class="logo">
			<div class="logo-en">The Star</div>
			<div class="logo-title">東 方 之 星</div>
			<div class="logo-subtitle">購物後台管理系統</div>
		</div>
		<div class="nav flex-column mt-2 flex-grow-1">
			<div class="nav-section">主選單</div>
			<a href="/admin/shop" class="nav-link"
				th:classappend="${activePage == 'home'} ? 'active'"> <i
				class="fa-solid fa-gauge fa-fw"></i> 後台控制台
			</a>

			<div class="nav-section">商品管理</div>
			<a href="/admin/shop/listAllProducts" class="nav-link"
				th:classappend="${activePage == 'shop'} ? 'active'"> <i
				class="fa-solid fa-bag-shopping fa-fw"></i> 商品列表
			</a> <a href="/admin/shop/category/listAllCategories" class="nav-link"
				th:classappend="${activePage == 'category'} ? 'active'"> <i
				class="fa-solid fa-tags fa-fw"></i> 商品類別
			</a>

			<div class="nav-section">訂單 &amp; 評論</div>

			<a href="/admin/shop/order/listAllOrders" class="nav-link"
				th:classappend="${activePage == 'order'} ? 'active'"> <i
				class="fa-solid fa-cart-shopping fa-fw"></i> 訂單管理
			</a> <a href="/admin/shop/review/listAllReviews" class="nav-link"
				th:classappend="${activePage == 'review'} ? 'active'"> <i
				class="fa-solid fa-comment-dots fa-fw"></i> 商品評論
			</a>
		</div>
		<div class="sidebar-footer">
			<a href="/thestar/admin/home"> <i class="fa-solid fa-arrow-left"></i>
				回後台
			</a>
		</div>
	</div>

	<div th:fragment="topbar(pageTitle)" class="top-navbar">
		<h4 class="m-0 fw-bold" th:text="${pageTitle}">分頁標題</h4>
		<div class="d-flex align-items-center gap-3">
			<span style="color: #6a5030; font-size: 13px;"> <i
				class="fa-solid fa-user-shield me-1"></i> <span
				th:text="${employeeName != null ? employeeName : '管理員'}"></span>
			</span> <a href="/thestar/admin/home" class="btn btn-outline-gold btn-sm">
				<i class="fa-solid fa-house me-1"></i>後台首頁
			</a>
		</div>
	</div>


</body>
</html>
