<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${mode == 'add'} ? '新增員工 - The Star Hotel' : '編輯員工 - The Star Hotel'"></title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600&family=Jost:wght@300;400;500&family=Noto+Serif+TC:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/admin.css}">
    <script th:src="@{/js/theme.js}"></script>
</head>
<body class="admin-body">
<div class="admin-frame">
    <div class="admin-topbar">
        <button class="theme-toggle" onclick="toggleTheme()" title="切換深色 / 淺色模式">🌓</button>
        <div class="admin-brand">
            <b>The Star</b>
            <span class="admin-pill">Admin</span>
        </div>
        <div class="admin-user">
            <span class="admin-avatar" th:text="${#strings.substring(currentEmployeeName, 0, 1)}"></span>
            <span th:text="${currentEmployeeName}"></span>
            <form th:action="@{/thestar/admin/logout}" method="post">
                <button type="submit" class="admin-button line sm">登出</button>
            </form>
        </div>
    </div>

    <aside class="admin-sidebar">
        <div class="side-section">
            <a class="side-link" th:href="@{/thestar/admin/home}"><span class="side-icon">⌂</span>控制中心</a>
        </div>
        <div class="side-section">
            <p class="side-title">用戶管理</p>
            <a class="side-link active" th:href="@{/thestar/admin/employee/list}"><span class="side-icon">◎</span>員工管理</a>
        </div>
        <div class="side-section">
            <p class="side-title">內容管理</p>
            <a class="side-link" th:href="@{/thestar/admin/content/news}"><span class="side-icon">▤</span>最新消息管理</a>
            <a class="side-link" th:href="@{/thestar/admin/content/article}"><span class="side-icon">✎</span>文章管理</a>
            <a class="side-link" th:href="@{/thestar/admin/content/review}"><span class="side-icon">☰</span>文章評論管理</a>
        </div>
    </aside>

<main class="admin-main">
    <div class="admin-heading">
        <div>
            <h1 th:text="${mode == 'add'} ? '新增員工' : '編輯員工'"></h1>
            <p th:if="${mode != 'add'}" th:text="${employeeMail}"></p>
            <p th:if="${mode == 'add'}">建立員工帳號與基本資料</p>
        </div>
    </div>

    <form th:object="${employee}"
          th:action="${mode == 'add'} ? @{/thestar/admin/employee/add} : @{'/thestar/admin/employee/edit/' + ${employeeId}}"
          method="post" class="admin-card admin-form">

        <div class="field">
            <label for="employeeName">姓名</label>
            <input id="employeeName" type="text" th:field="*{employeeName}" required>
        </div>

        <th:block th:if="${mode == 'add'}">
            <div class="field">
                <label for="employeeMail">Email</label>
                <input id="employeeMail" type="email" th:field="*{employeeMail}" required>
            </div>

            <div class="field">
                <label for="password">密碼</label>
                <input id="password" type="password" th:field="*{password}" required>
            </div>

            <div class="field">
                <label for="hireDate">到職日</label>
                <input id="hireDate" type="date" th:field="*{hireDate}" required>
            </div>
        </th:block>

        <div class="admin-form-grid">
            <div class="field">
                <label for="phone">電話</label>
                <input id="phone" type="text" th:field="*{phone}">
            </div>

            <div class="field">
                <label for="gender">性別</label>
                <select id="gender" th:field="*{gender}">
                    <option value="M">男</option>
                    <option value="F">女</option>
                    <option value="OTHER">其他</option>
                </select>
            </div>
        </div>

        <div class="field">
            <label for="address">地址</label>
            <input id="address" type="text" th:field="*{address}">
        </div>

        <div class="admin-form-grid">
            <div class="field">
                <label for="departmentId">部門</label>
                <select id="departmentId" th:field="*{departmentId}">
                    <option th:each="d : ${departments}" th:value="${d.departmentId}" th:text="${d.departmentName}"></option>
                </select>
            </div>

            <div class="field">
                <label for="jobTitleId">職稱</label>
                <select id="jobTitleId" th:field="*{jobTitleId}">
                    <option th:each="j : ${jobTitles}" th:value="${j.jobTitleId}" th:text="${j.jobTitleName}"></option>
                </select>
            </div>
        </div>

        <div class="form-actions">
            <button type="submit" class="admin-button">儲存</button>
            <a th:href="@{/thestar/admin/employee/list}" class="admin-button line">取消</a>
        </div>
    </form>
</main>
</div>
</body>
</html>
