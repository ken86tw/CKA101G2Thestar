<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{admin/restaurant/common_sidebar :: common-head('The Star 後台管理主頁')}"></head>
<style>
    /* 調整卡片風格以配合整體優雅色調 */
    .dashboard-card {
        border: 1px solid #e8e0d0;
        background: #fffdf8;
        padding: 24px;
        border-radius: 12px;
        transition: transform 0.2s, box-shadow 0.2s;
    }
    .dashboard-card:hover {
        transform: translateY(-5px);
        box-shadow: 0 8px 20px rgba(156, 124, 79, 0.15);
    }
    .dashboard-card h5 { color: #5a4e3e; font-family: 'Noto Serif TC', serif; margin-bottom: 12px; }
    .dashboard-card p { color: #8a7a65; font-size: 0.9rem; margin-bottom: 20px; }
    
    /* 按鈕樣式 */
    .btn-gold-light {
        background-color: #ede8df;
        color: #7a5c30;
        border: none;
        font-weight: 600;
        padding: 8px 16px;
        border-radius: 20px;
        transition: all 0.3s;
    }
    .btn-gold-light:hover { background-color: #c9a84c; color: #fff; }
</style>
<body>
    <div th:replace="~{admin/restaurant/common_sidebar :: sidebar('home')}"></div>
    
    <div class="main-content">
        <div th:replace="~{admin/restaurant/common_sidebar :: topbar('餐廳控制台首頁')}"></div>
        
        <div class="page-body">
            <div class="row g-4">
                <!-- 預約管理 -->
                <div class="col-md-4">
                    <div class="dashboard-card">
                        <h5><i class="fa-solid fa-calendar-check me-2" style="color: #c9a84c;"></i> 快速處理預約</h5>
                        <p>查看今日訂位狀態，執行確認或調整服務。</p>
                        <a href="/admin/restaurant/reservation/list" class="btn btn-gold-light">前往管理</a>
                    </div>
                </div>
                <!-- 菜單管理 -->
                <div class="col-md-4">
                    <div class="dashboard-card">
                        <h5><i class="fa-solid fa-utensils me-2" style="color: #c9a84c;"></i> 菜單品項調整</h5>
                        <p>即時更新餐廳菜色、價格與供應狀態。</p>
                        <a href="/admin/restaurant/menu/list" class="btn btn-gold-light">前往管理</a>
                    </div>
                </div>
                <!-- 評論管理 -->
                <div class="col-md-4">
                    <div class="dashboard-card">
                        <h5><i class="fa-solid fa-comment-dots me-2" style="color: #c9a84c;"></i> 最新顧客評價</h5>
                        <p>回覆顧客心聲，維護良好的互動體驗。</p>
                        <a href="/admin/restaurant/review/list" class="btn btn-gold-light">前往管理</a>
                    </div>
                </div>
            </div>
            
            <!-- 系統說明 -->
            <div class="card mt-5 p-4" style="background: #fdfaf5; border: 1px solid #e8e0d0;">
                <h5 class="fw-bold mb-3" style="color: #5a4e3e;"><i class="fa-solid fa-circle-info text-warning me-2"></i>系統營運說明</h5>
                <p class="text-muted" style="line-height: 1.8;">
                    歡迎使用 <strong>The Star 餐廳後台管理系統</strong>。本後台協助您高效管理餐廳營運，包括「基礎設定」、「前台菜單展示」與「營運數據」。<br>
                    請點選左側選單進行各項操作，若遇操作問題，請聯繫系統管理員協助處理。
                </p>
            </div>
        </div>
    </div>
</body>
</html>
