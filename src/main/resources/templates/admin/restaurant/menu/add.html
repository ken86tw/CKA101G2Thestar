<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>新增餐點品項</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="container mt-4" style="max-width: 600px;">
    <h2>上架新餐點項目</h2>
    
    <!-- 1. 必須加上 enctype="multipart/form-data" -->
    <form th:action="@{/admin/restaurant/menu/save}" th:object="${restaurantMenuVO}" method="post" enctype="multipart/form-data" class="mt-3">
        
        <div class="mb-3">
            <label class="form-label">選擇菜單分類:</label>
            <select th:field="*{menuCategoryVO.categoryId}" class="form-select" required>
                <option value="">-- 請選擇品項分類 --</option>
                <option th:each="cat : ${categoryList}" th:value="${cat.categoryId}" th:text="${cat.categoryName}"></option>
            </select>
        </div>
        
        <div class="mb-3">
            <label class="form-label">餐點品名:</label>
            <input type="text" th:field="*{itemName}" class="form-control" required>
        </div>
        
        <div class="mb-3">
            <label class="form-label">餐點介紹敘述:</label>
            <textarea th:field="*{itemDesc}" class="form-control" rows="2"></textarea>
        </div>
        
        <div class="mb-3">
            <label class="form-label">單價 (元):</label>
            <input type="number" step="0.01" th:field="*{price}" class="form-control" required>
        </div>
        
        <!-- 2. 將文字輸入框改為檔案上傳元件 -->
        <div class="mb-3">
            <label class="form-label">上傳餐點圖片:</label>
            <!-- name 屬性設為 itemImageFile，等等會對應到 Controller -->
            <input type="file" name="itemImageFile" id="itemImageFile" class="form-control" accept="image/*" onchange="previewImage(this)">
            
            <!-- 即時預覽區塊 -->
            <div class="mt-3 text-center">
                <img id="imagePreview" src="#" alt="圖片預覽" class="img-thumbnail d-none" style="max-height: 200px;">
            </div>
        </div>
        
        <div class="mb-3">
            <label class="form-label">前台顯示排序編號:</label>
            <input type="number" th:field="*{sortOrder}" class="form-control" value="10" required>
        </div>
        
        <button type="submit" class="btn btn-success">確認上架</button>
        <a href="/admin/restaurant/menu/list" class="btn btn-secondary">取消</a>
    </form>

    <!-- 3. 新增 JS 即時預覽腳本 -->
    <script>
        function previewImage(input) {
            const preview = document.getElementById('imagePreview');
            if (input.files && input.files[0]) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    preview.src = e.target.result;
                    preview.classList.remove('d-none');
                }
                reader.readAsDataURL(input.files[0]);
            } else {
                preview.src = '#';
                preview.classList.add('d-none');
            }
        }
    </script>
</body>
</html>
