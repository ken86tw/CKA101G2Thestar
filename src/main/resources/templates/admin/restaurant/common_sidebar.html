<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:fragment="common-head(title)">
<meta charset="UTF-8">
<title th:text="${title}">The Star 餐廳後台</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600&family=Jost:wght@300;400;500&family=Noto+Serif+TC:wght@300;400;500;600&family=Noto+Sans+TC:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
    * { font-family: 'Jost', 'Noto Sans TC', sans-serif; }
    body { display: flex; min-height: 100vh; background-color: #f5f0e8; overflow-x: hidden; }

    /* ===== Sidebar ===== */
    .sidebar { width: 260px; background-color: #ede8df; color: #3a3226; min-height: 100vh; display: flex; flex-direction: column; border-right: 1px solid #ddd5c5; }
    .sidebar .logo { padding: 28px 20px; text-align: center; background-color: #e5ddd0; border-bottom: 1px solid #ddd5c5; }
    .sidebar .logo-en { font-family: 'Cormorant Garamond', serif; font-style: italic; font-size: 1.6rem; color: #9c7c4f; letter-spacing: 2px; margin-bottom: 4px; }
    .sidebar .logo-title { font-family: 'Noto Serif TC', serif; font-size: 1rem; font-weight: 600; color: #3a3226; letter-spacing: 4px; margin: 0; }
    .sidebar .nav-section { padding: 16px 12px 4px; font-size: 10px; color: #9a8a75; letter-spacing: 2px; text-transform: uppercase; font-family: 'Jost', sans-serif; }
    .sidebar .nav-link { color: #5a4e3e; padding: 11px 16px; display: flex; align-items: center; gap: 12px; transition: all 0.2s; border-radius: 6px; margin: 2px 8px; font-size: 14px; }
    .sidebar .nav-link:hover { background-color: rgba(156, 124, 79, 0.12); color: #7a5c30; text-decoration: none; border-radius: 20px; }
    .sidebar .nav-link.active { background-color: #e0d8cc; color: #7a5c30; font-weight: 500; border-radius: 20px; }
    .sidebar .nav-link i { width: 16px; text-align: center; opacity: 0.7; }
    .sidebar-footer { padding: 16px; border-top: 1px solid #ddd5c5; margin-top: auto; }
    .sidebar-footer a { color: #8a7a65; font-size: 13px; text-decoration: none; display: flex; align-items: center; gap: 8px; }

    /* ===== Topbar ===== */
    .top-navbar { background-color: #f8f4ee; padding: 16px 32px; border-bottom: 1px solid #e8e0d0; display: flex; justify-content: space-between; align-items: center; }
    .top-navbar h4 { font-family: 'Noto Serif TC', serif; color: #3a3226; font-size: 1.1rem; letter-spacing: 2px; font-weight: 500; }
    
    /* ===== Components ===== */
    .btn-outline-gold { background: transparent; color: #9c7c4f; border: 1px solid #9c7c4f; padding: 5px 15px; border-radius: 4px; }
    .btn-outline-gold:hover { background-color: #9c7c4f; color: #fff; }
</style>
</head>
<body>

    <div th:fragment="sidebar(activePage)" class="sidebar">
        <div class="logo">
            <div class="logo-en">The Star</div>
            <div class="logo-title">餐廳後台管理</div>
        </div>
        
        <div class="nav flex-column mt-2 flex-grow-1">
            <div class="nav-section">系統功能</div>
            <a href="/admin/restaurant" class="nav-link" th:classappend="${activePage == 'home'} ? 'active'">
                <i class="fa-solid fa-gauge fa-fw"></i> 餐廳控制台
            </a>

            <div class="nav-section">預約與桌況</div>
            <a href="/admin/restaurant/table/list" class="nav-link" th:classappend="${activePage == 'table'} ? 'active'">
                <i class="fa-solid fa-table fa-fw"></i> 桌數包場設定
            </a>
            <a href="/admin/restaurant/table/availability" class="nav-link" th:classappend="${activePage == 'availability'} ? 'active'">
                <i class="fa-solid fa-magnifying-glass fa-fw"></i> 每日桌況餘量
            </a>
            <a href="/admin/restaurant/reservation/list" class="nav-link" th:classappend="${activePage == 'reservation'} ? 'active'">
                <i class="fa-solid fa-calendar-check fa-fw"></i> 預約紀錄管理
            </a>

            <div class="nav-section">營運管理</div>
            <a href="/admin/restaurant/businesshours/list" class="nav-link" th:classappend="${activePage == 'hours'} ? 'active'">
                <i class="fa-solid fa-clock fa-fw"></i> 營業時段管理
            </a>
            <a href="/admin/restaurant/menu/list" class="nav-link" th:classappend="${activePage == 'menu'} ? 'active'">
                <i class="fa-solid fa-utensils fa-fw"></i> 餐廳菜單管理
            </a>
            <a href="/admin/restaurant/review/list" class="nav-link" th:classappend="${activePage == 'review'} ? 'active'">
                <i class="fa-solid fa-comment-dots fa-fw"></i> 顧客評論管理
            </a>
        </div>
        
        <div class="sidebar-footer">
            <a href="/thestar/admin/home"> <i class="fa-solid fa-arrow-left"></i> 回總後台</a>
        </div>
    </div>

    <div th:fragment="topbar(pageTitle)" class="top-navbar">
        <h4 class="m-0 fw-bold" th:text="${pageTitle}">分頁標題</h4>
        <div class="d-flex align-items-center gap-3">
            <span style="color: #6a5030; font-size: 13px;"> 
                <i class="fa-solid fa-user-shield me-1"></i> 管理員
            </span> 
            <a href="/thestar/admin/home" class="btn btn-outline-gold btn-sm">
                <i class="fa-solid fa-house me-1"></i>後台首頁
            </a>
        </div>
    </div>

</body>
</html>
