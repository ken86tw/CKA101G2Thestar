<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{admin/restaurant/common_sidebar :: common-head('桌型管理設定')}"></head>
<body>
    <div th:replace="~{admin/restaurant/common_sidebar :: sidebar('table')}"></div>
    <div class="main-content">
        <div th:replace="~{admin/restaurant/common_sidebar :: topbar('預設桌數設定')}"></div>
        <div class="page-body">
            
            <!-- 操作結果提示訊息 -->
            <div th:if="${successMessage}" class="alert alert-success alert-dismissible fade show" role="alert">
                <i class="fa-solid fa-circle-check me-2"></i><span th:text="${successMessage}"></span>
                <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
            </div>
            <div th:if="${errorMessage}" class="alert alert-danger alert-dismissible fade show" role="alert">
                <i class="fa-solid fa-circle-exclamation me-2"></i><span th:text="${errorMessage}"></span>
                <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
            </div>

            <!-- 現有桌型列表 -->
            <div class="card p-4">
                <div class="d-flex justify-content-between align-items-center mb-3">
                    <h5 class="m-0 fw-bold"><i class="fa-solid fa-list me-2"></i>預設桌數設定</h5>
                </div>
                <table class="table table-hover table-bordered align-middle">
                    <thead class="table-light">
                        <tr>
                            <th>桌型流水號 (ID)</th>
                            <th>桌型名稱 (Table Type Name)</th>
                            <th>該規格總桌數 (Table Count)</th>
                            <th width="180">操作</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="table : ${tableList}">
                            <td th:text="${table.tableTypeId}">1</td>
                            <td class="fw-bold text-primary" th:text="${table.tableTypeName}">LARGE_TABLE</td>
                            <td th:text="${table.tableTypeCount} + ' 桌'">2 桌</td>
                            <td>
                                <a th:href="@{/admin/restaurant/table/editPage(tableType=${table.tableTypeId})}" class="btn btn-warning btn-sm">
                                    <i class="fa-solid fa-pen"></i> 修改
                                </a>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>


        </div>
    </div>
</body>
</html>
