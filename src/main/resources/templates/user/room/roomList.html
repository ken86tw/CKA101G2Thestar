<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>精選房型 - THE STAR</title>
<link rel="stylesheet"
	href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
<link rel="stylesheet" th:href="@{/css/common.css}">
<link rel="stylesheet" th:href="@{/css/roomList.css}">

<style>

/* 強制隱藏導覽列中的購物車圖示與連結 */
.shop-navbar a[href*="cart"], .shop-navbar a[href*="Cart"], .shop-navbar .fa-cart-shopping,
	.shop-navbar .fa-bag-shopping, .shop-navbar .cart-icon {
	display: none !important;
}
</style>


</head>


<body>

	<div
		th:replace="~{user/common/frontNavbar :: navbar('room', true, 'shop-navbar site-navbar-dark', false)}"></div>

	<div class="room-container">
		<div class="room-grid">
			<div th:each="room : ${activeRoomList}" class="room-card">

				<div class="card-image">
					<!-- 確保只有在 firstPhoto 本身不為空，且 ID 存在時才渲染 -->
					<img
						th:if="${room.firstPhoto != null and room.firstPhoto.roomTypePhotoId != null}"
						th:src="@{/roomtypephoto/display/photo/{id}(id=${room.firstPhoto.roomTypePhotoId})}"
						th:alt="${room.roomTypeName}">

					<!-- 當沒有圖片或 ID 為空時，顯示預設圖片 -->
					<img
						th:unless="${room.firstPhoto != null and room.firstPhoto.roomTypePhotoId != null}"
						th:src="@{/images/noimage.jpg}" alt="暫無圖片">
				</div>

				<div class="card-content">
					<h3 th:text="${room.roomTypeName}">房型名稱</h3>
					<p class="room-desc" th:text="${room.roomTypeContent}">房型簡介...</p>
					<div class="price-section">
						<strong>TWD <span th:text="${room.roomTypePrice}">0</span></strong>
					</div>
				</div>
				<div class="card-actions">
					<a href="/roombooking.html" class="btn-book">預訂</a>
					<!-- 添加了 data-id 屬性以便 JS 抓取該房型 ID -->

					<a th:href="@{/roomList/detail/{id}(id=${room.roomTypeId})}"
						class="btn-more">詳細資訊</a>

				</div>
			</div>
		</div>
	</div>

	<!-- 你的邏輯 JS -->
	<script th:src="@{/js/header-auth.js}"></script>
	<script th:src="@{/js/roomList.js}"></script>
</body>
</html>
