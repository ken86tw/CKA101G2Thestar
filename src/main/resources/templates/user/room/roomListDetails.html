<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>房型詳情 - THE STAR</title>
<link rel="stylesheet"
	href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
<link rel="stylesheet" th:href="@{/css/common.css}">
<link rel="stylesheet" th:href="@{/css/roomListDetails.css}">
<style>

/* 強制隱藏導覽列中的購物車圖示與連結 */
.shop-navbar a[href*="cart"], .shop-navbar a[href*="Cart"], .shop-navbar .fa-cart-shopping,
	.shop-navbar .fa-bag-shopping, .shop-navbar .cart-icon {
	display: none !important;
}
</style>
</head>
<body>
	<div
		th:replace="~{user/common/frontNavbar :: navbar('room', true, 'shop-navbar site-navbar-dark', false)}"></div>

	<div class="detail-container">
		<!-- Grid 佈局：僅包含圖片與右側詳細資訊 -->
		<div class="detail-grid">
			<div class="slider-wrapper">
				<div class="slider">
					<img id="main-room-img"
						th:if="${photoList != null && !photoList.isEmpty()}"
						th:src="@{/roomtypephoto/display/photo/{id}(id=${photoList[0].roomTypePhotoId})}"
						alt="Room Image"> <img id="main-room-img"
						th:unless="${photoList != null && !photoList.isEmpty()}"
						src="/images/noimage.jpg" alt="No Image">
				</div>
				<button type="button" class="nav-prev">
					<i class="fas fa-chevron-left"></i>
				</button>
				<button type="button" class="nav-next">
					<i class="fas fa-chevron-right"></i>
				</button>
			</div>

			<div class="info-wrapper">
				<h1 class="room-title" th:text="${room.roomTypeName}">房型名稱</h1>
				<div class="room-specs">
					<h3>ROOM DETAILS</h3>
					<p class="description" th:text="${room.roomTypeContent}">房型內容描述...</p>
					<div class="spec-item">
						<i class="fas fa-users"></i> 最多可容納 <span
							th:text="${room.capacity}">6</span> 人
					</div>
					<div class="spec-item"
						style="font-size: 1.2em; color: #b5894b; font-weight: bold; margin: 15px 0;">
						<i class="fas fa-tag"></i> 價格：NT$ <span
							th:text="${room.roomTypePrice}">0</span> / 晚
					</div>
					<a th:href="@{/roombooking.html}" class="btn-book">預訂</a> <a
						th:href="@{/roomlist/list}" class="btn-back"
						style="display: block; text-align: center; margin-top: 15px; color: #b5894b; text-decoration: underline;">«
						返回房型列表</a>
				</div>
			</div>
		</div>

		<!-- 移到 Grid 下方：內部設施 -->
		<div class="highlights">
			<h3>內部設施</h3>
			<div class="highlight-grid">
				<p th:text="${room.amenities}">設施資訊...</p>
			</div>
		</div>

		<div id="photo-ids" th:if="${photoList != null}"
			th:data-ids="${#strings.listJoin(photoList.![roomTypePhotoId], ',')}"
			style="display: none;"></div>
	</div>

	<script th:src="@{/js/roomListDetails.js}"></script>
</body>
</html>
