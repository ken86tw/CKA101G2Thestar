<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<!-- 1. 前台共用 Head -->
<head th:fragment="front-head(title)">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${title}">The Star 餐廳</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
    body { font-family: 'Helvetica Neue', Arial, sans-serif; background-color: #fafafa; color: #333; }
    .navbar { background-color: #1a1a1a; }
    
    /* 讓前台 Navbar 所有文字一律保持純白 */
    .navbar-brand, 
    .nav-link, 
    .nav-link:hover, 
    .nav-link.active {
        color: #ffffff !important;
    }
    
    .hero-section {
        background: linear-gradient(rgba(0, 0, 0, 0.6), rgba(0, 0, 0, 0.6)),
            url('https://images.unsplash.com/photo-1517248135467-4c7edcad34c4?w=1200') no-repeat center center/cover;
        height: 400px; display: flex; align-items: center; justify-content: center; color: white;
    }
    .footer { background-color: #1a1a1a; color: #aaa; padding: 20px 0; margin-top: 40px; }
</style>
</head>
<body>

    <!-- 2. 前台共用 Navbar (傳入 activePage 來動態高亮當前分頁) -->
    <nav th:fragment="front-navbar(activePage)" class="navbar navbar-expand-lg sticky-top">
        <div class="container">
            <a class="navbar-brand" th:href="@{/index.html}">The Star</a>
            <div class="collapse navbar-collapse justify-content-end">
                <ul class="navbar-nav">
                    <li class="nav-item">
                        <a class="nav-link" th:href="@{/restaurant/index}" th:classappend="${activePage == 'index'} ? 'active'">餐廳首頁介紹</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" th:href="@{/restaurant/menu}" th:classappend="${activePage == 'menu'} ? 'active'">美味菜單</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" th:href="@{/restaurant/booking/list}" th:classappend="${activePage == 'booking'} ? 'active'">我的訂位</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" th:href="@{/restaurant/review}" th:classappend="${activePage == 'reviews'} ? 'active'">顧客評論</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- 3. 前台共用 Footer -->
    <footer th:fragment="front-footer" class="footer text-center">
        <p>© 2026 The Star. All Rights Reserved. 後台系統對接準備就緒。</p>
    </footer>

</body>
</html>
