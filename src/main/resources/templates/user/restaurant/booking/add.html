<!DOCTYPE html>
<html lang="zh-TW" xmlns:th="http://www.thymeleaf.org">
<head>
    <th:block th:replace="~{user/restaurant/userNavBar :: front-head('The Star 餐廳 - 線上訂位')}"></th:block>
    <style>
        body { background-color: #f7f9fa; }
        .booking-card {
            background: white;
            border-radius: 12px;
            padding: 30px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.05);
        }
        .error-text {
            color: #d9534f;
            font-size: 0.85rem;
            margin-top: 5px;
        }
    </style>
</head>
<body>

    <nav th:replace="~{user/restaurant/userNavBar :: front-navbar('booking')}"></nav>

	<div class="container my-5">
		<div class="row justify-content-center">
			<div class="col-md-8">
				<div class="text-center mb-4">
					<h1 class="fw-bold">立即預約席位</h1>
					<p class="text-muted">請填寫下方表單以完成您的線上訂位需求</p>
				</div>

				<div th:if="${successMessage}"
					class="alert alert-success text-center" th:text="${successMessage}"></div>
				<div th:if="${errorMessage}" class="alert alert-danger text-center"
					th:text="${errorMessage}"></div>

				<div class="booking-card">
					<form th:action="@{/restaurant/booking/submit}"
						th:object="${reservationVO}" method="POST">

						<div class="mb-3">
							<label class="form-label">會員編號 (Member ID)</label> <input
								type="number" class="form-control"
								th:field="*{memberVO.memberId}" readonly>
							<div class="form-text">已鎖定當前登入之會員。</div>
						</div>

						<div class="mb-3">
							<label class="form-label" for="guests">預約用餐人數</label> <select
								id="guests" name="guests" class="form-select"
								onchange="updateBookingOptions()">
								<option value="1">1 位</option>
								<option value="2" selected>2 位 (預設)</option>
								<option value="3">3 位</option>
								<option value="4">4 位</option>
								<option value="5">5 位</option>
								<option value="6">6 位</option>
								<option value="7">7 位</option>
								<option value="8">8 位</option>
								<option value="9">9 位</option>
								<option value="10">10 位</option>
							</select>
							<div class="form-text">1-4 人排小桌，5-10 人排大桌。</div>
						</div>

						<div id="booking-options-wrapper">
							<div th:fragment="bookingOptions">

								<div class="mb-3">
									<label class="form-label">預約用餐日期</label> <select
										class="form-select" name="date" required>
										<option value="" th:selected="${reservationVO.date == null}">--
											請選擇有空位的日期 --</option>
										<option th:each="d : ${availableDates}" th:value="${d}"
											th:text="${d}" th:selected="${d == reservationVO.date}">
										</option>
									</select>
									<div class="form-text th-div"
										th:if="${#lists.isEmpty(availableDates)}" style="color: red;">
										該人數目前無任何可用日期，請重新選擇人數。</div>
									<div class="error-text" th:if="${#fields.hasErrors('date')}"
										th:errors="*{date}"></div>
								</div>

								<div class="mb-3">
									<label class="form-label">預約用餐時段</label> <select
										class="form-select" th:field="*{businessHoursVO.sessionId}"
										required>
										<option value="">-- 請選擇時段 --</option>
										<option th:each="item : ${availableSessions}"
											th:value="${item.id.sessionId}"
											th:text="${'時段 ' + item.id.sessionId + ' (' + item.businessHoursVO.startTime + ' - ' + item.businessHoursVO.endTime + ')'}">
										</option>
									</select>
									<div class="form-text"
										th:if="${#lists.isEmpty(availableSessions)}"
										style="color: red;">當前日期無可用時段。</div>
									<div class="error-text"
										th:if="${#fields.hasErrors('businessHoursVO.sessionId')}"
										th:errors="*{businessHoursVO.sessionId}"></div>
								</div>

							</div>
						</div>

						<div class="mb-3">
							<label class="form-label">預約桌型備註</label> <input type="text"
								class="form-control" value="系統將依您填寫的人數自動為您保留大桌或小桌" readonly
								style="background-color: #e9ecef;">
						</div>

						<div class="mb-3">
							<label class="form-label">特殊需求備註 (選填)</label>
							<textarea class="form-control" th:field="*{reservationRequest}"
								rows="3" placeholder="如有慶生、求婚需求或對食物過敏..."></textarea>
							<div class="error-text"
								th:if="${#fields.hasErrors('reservationRequest')}"
								th:errors="*{reservationRequest}"></div>
						</div>

						<div class="d-grid mt-4">
							<button type="submit" class="btn btn-primary btn-lg">確認送出訂位</button>
						</div>
					</form>
				</div>
			</div>
		</div>
	</div>

    <footer th:replace="~{user/restaurant/userNavBar :: front-footer}"></footer>

	<script>
function updateBookingOptions() {
    const guests = document.getElementById("guests").value;
    const wrapper = document.getElementById("booking-options-wrapper");

    wrapper.style.opacity = "0.5";

    fetch(`/restaurant/booking/api/options?guests=${guests}`, {
        method: 'GET'
    })
    .then(response => {
        if (!response.ok) throw new Error('網路回應錯誤');
        return response.text();
    })
    .then(htmlFragment => {
        wrapper.innerHTML = htmlFragment;
        wrapper.style.opacity = "1";
    })
    .catch(error => {
        console.error('局部更新出錯：', error);
        wrapper.style.opacity = "1";
    });
}
</script>

</body>
</html>
