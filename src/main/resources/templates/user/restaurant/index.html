<!DOCTYPE html>
<html lang="zh-TW" xmlns:th="http://www.thymeleaf.org">
<!-- 取代為共用 Head -->
<head th:replace="~{user/restaurant/userNavBar :: front-head('The Star 餐廳 - 關於我們')}"></head>
<body>

    <!-- 取代為共用 Navbar，並傳入 'index' 讓首頁/關於我們區塊亮起 -->
    <nav th:replace="~{user/restaurant/userNavBar :: front-navbar('index')}"></nav>

	<div class="hero-section text-center">
		<div>
			<h1 class="display-4 fw-bold">歡迎光臨 The Star 餐廳</h1>
			<p class="lead">璀璨星光下的極致奢華饗宴</p>
		</div>
	</div>

	<div class="container my-5">
		<div class="row justify-content-center">
			<div class="col-md-8 text-center">
				<h2 class="mb-4">關於 The Star</h2>
				<p class="lead text-muted">我們成立於西元 2024
					年，致力於將新鮮的頂級食材與極致的烹飪工藝相結合。無論是浪漫的雙人約會、溫馨的家庭聚餐，還是商務宴會，The Star
					都將為您營造最璀璨迷人的用餐時光。</p>
				<hr class="my-5">
				<h3>營業時間</h3>
				<p>週一至週日：11:30 - 14:30 | 17:30 - 21:30</p>
				<a th:href="@{/restaurant/booking}"
					class="btn btn-warning btn-lg mt-3">立即預約訂位</a>
			</div>
		</div>
	</div>

    <!-- 取代為共用 Footer -->
    <footer th:replace="~{user/restaurant/userNavBar :: front-footer}"></footer>

</body>
</html>
