<!DOCTYPE html>
<html lang="zh-Hant" xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>東方之星 The Star｜飯店精選商品</title>
<link rel="stylesheet"
	href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
<link
	href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@500;700&family=Noto+Sans+TC:wght@300;400;500;700&family=Cormorant+Garamond:ital,wght@1,400;1,600&display=swap"
	rel="stylesheet">
<link rel="stylesheet" href="/css/common.css">
<style>
.page-header {
	position: relative;
	color: #fff;

	background:
		linear-gradient(rgba(0,0,0,.45), rgba(0,0,0,.25)),
		url('https://images.unsplash.com/photo-1542581509-7e87190743b6?w=1600&auto=format&fit=crop&q=80')
		center/cover no-repeat;
}

.page-header .site-navbar {
	position: absolute;
	top: 0;
	left: 0;
	width: 100%;
	z-index: 100;
	background: transparent;
}

body {
	font-family: 'Noto Sans TC', sans-serif;
	background: #f5f8fa;
	color: #2c3e50;
	padding-top: 0 !important;
}

/* Hero */
.sub-hero {
  min-height: 260px;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  text-align: center;
  padding: 70px 20px;
}

.hero-subtitle{
    color:var(--color-gold-light);
    font-size:15px;
    letter-spacing:4px;
    margin-bottom:18px;
}

.sub-hero h2 {
    font-family: var(--font-title);
    font-size: clamp(42px, 5vw, 60px);
    letter-spacing: 6px;
    text-shadow: 0 4px 18px rgba(0,0,0,.35);
}

.sub-hero p {
    margin-top: 18px;
    font-size: 18px;
    letter-spacing: 2px;
    text-shadow: 0 3px 12px rgba(0,0,0,.35);
}

.hero-subtitle {
	color: var(--color-gold-light);
	letter-spacing: 4px;
	font-size: 15px;
	margin-bottom: 18px;
}

.hero-title {
	font-family: var(--font-title);
	font-size: 48px;
	letter-spacing: 6px;
}

.hero-line {
	width: 70px;
	height: 3px;
	margin: 26px auto;
	background: var(--color-gold);
}

.hero-desc {
	font-size: 16px;
	letter-spacing: 2px;
}

/* ========================= */
.shop-container {
	max-width: 1280px;
	margin: auto;
	padding: 80px 6%;
}

/* Header */
.section-header {
	display: flex;
	justify-content: space-between;
	align-items: flex-end;
	margin-bottom: 35px;
}

.section-header small {
	color: var(--color-muted);
}

/* Search */
.search-bar {
	display: flex;
	gap: 12px;
	margin-bottom: 30px;
}

.search-bar input {
	flex: 1;
	height: 48px;
	padding: 0 18px;
	border: 1px solid var(--color-border);
	border-radius: 6px;
	font-size: 15px;
}

.search-bar input:focus {
	outline: none;
	border-color: var(--color-gold);
}

.search-bar button {
	padding: 0 26px;
	border: none;
	border-radius: 6px;
	background: var(--color-gold);
	color: #fff;
	cursor: pointer;
	font-weight: 600;
	transition: .25s;
}

.search-bar button:hover {
	background: var(--color-gold-dark);
}

.search-clear {
	display: flex;
	align-items: center;
	justify-content: center;
	padding: 0 20px;
	border: 1px solid var(--color-border);
	border-radius: 6px;
	transition: .25s;
}

.search-clear:hover {
	color: var(--color-gold-dark);
	border-color: var(--color-gold);
}

/* Search info */
.search-info {
	padding: 15px 20px;
	margin-bottom: 28px;
	border-left: 4px solid var(--color-gold);
	background: #faf7f1;
	color: var(--color-muted);
}

/* Category */
.category-list {
	display: flex;
	flex-wrap: wrap;
	gap: 12px;
	margin-bottom: 45px;
	padding-bottom: 25px;
	border-bottom: 1px solid var(--color-border);
}

.category-list a {
	padding: 10px 24px;
	border-radius: 40px;
	border: 1px solid var(--color-border);
	transition: .25s;
}

.category-list a:hover {
	border-color: var(--color-gold);
	color: var(--color-gold-dark);
}

.category-list a.active {
	background: var(--color-gold);
	color: #fff;
	border-color: var(--color-gold);
}

/* Products */
.shop-grid {
	display: grid;
	grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
	gap: 32px;
}

.product-card {
	overflow: hidden;
	background: #fff;
	border-radius: 12px;
	border: 1px solid var(--color-border);
	box-shadow: var(--shadow-card);
	transition: .35s;
}

.product-card:hover {
	transform: translateY(-8px);
	box-shadow: var(--shadow-card-hover);
}

.product-card img {
	width: 100%;
	height: 230px;
	object-fit: cover;
	transition: .4s;
}

.product-card:hover img {
	transform: scale(1.05);
}

.product-img-placeholder {
	height: 230px;
	display: flex;
	align-items: center;
	justify-content: center;
	background: #f7f3ed;
	color: #cab28b;
	font-size: 54px;
}

.product-body {
	padding: 24px;
}

.product-name {
	font-family: var(--font-title);
	font-size: 22px;
	color: var(--color-text);
	margin-bottom: 12px;
}

.product-desc {
	color: var(--color-muted);
	font-size: 14px;
	line-height: 1.8;
	height: 52px;
	overflow: hidden;
	margin-bottom: 22px;
	display: -webkit-box;
	-webkit-box-orient: vertical;
	-webkit-line-clamp: 2;
}

.product-footer {
	display: flex;
	justify-content: space-between;
	align-items: center;
	border-top: 1px solid var(--color-border);
	padding-top: 18px;
}

.product-price {
	font-size: 26px;
	font-weight: bold;
	color: var(--color-gold);
}

.btn-detail {
	padding: 11px 24px;
	border-radius: 6px;
	background: var(--color-gold);
	color: #fff;
	transition: .25s;
}

.btn-detail:hover {
	background: var(--color-gold-dark);
	color: #fff;
}

/* No Result */
.no-result {
	text-align: center;
	padding: 100px 20px;
	color: var(--color-muted);
}

.no-result i {
	display: block;
	font-size: 60px;
	color: #d7c7aa;
	margin-bottom: 20px;
}

/* Mobile */
@media ( max-width :768px) {
	.shop-container {
		padding: 50px 20px;
	}
	.hero {
		height: 320px;
	}
	.hero-title {
		font-size: 36px;
	}
	.search-bar {
		flex-direction: column;
	}
	.section-header {
		flex-direction: column;
		align-items: flex-start;
		gap: 12px;
	}
	.shop-grid {
		grid-template-columns: 1fr;
	}
}
</style>
</head>
<body>
	<header class="page-header">

		<div
			th:replace="~{user/common/frontNavbar :: navbar('shop', true,' ', false)}">
		</div>

		<div class="sub-hero">
			<p class="hero-subtitle">HOTEL BOUTIQUE</p>
			<h2>飯店精選商品</h2>
			<div class="gold-line"></div>
			<p>嚴選伴手禮與旅遊好物，帶走最美好的回憶</p>
		</div>

	</header>

	<div class="shop-container">
		<div class="section-header">
			<div class="section-title"
				th:text="${keyword != null and !#strings.isEmpty(keyword)} ? '搜尋結果：' + ${keyword} : (${selectedCategoryId == null} ? '全部商品' : '篩選結果')">
				全部商品</div>
			<div style="font-size: 13px; color: #7a9aaa;"
				th:text="${#lists.size(productsListData)} + ' 件商品'"></div>
		</div>

		<!-- 搜尋框 -->
		<form action="/shop" method="get" class="search-bar">
			<input type="text" name="keyword" placeholder="搜尋商品名稱或介紹..."
				th:value="${keyword}">
			<button type="submit">
				<i class="fa-solid fa-magnifying-glass me-1"></i>搜尋
			</button>
			<a href="/shop" class="search-clear"
				th:if="${keyword != null and !#strings.isEmpty(keyword)}"> <i
				class="fa-solid fa-xmark me-1"></i>清除
			</a>
		</form>

		<!-- 搜尋結果提示 -->
		<div class="search-info"
			th:if="${keyword != null and !#strings.isEmpty(keyword)}"
			th:text="'搜尋「' + ${keyword} + '」，共找到 ' + ${#lists.size(productsListData)} + ' 件商品'">
		</div>

		<!-- 類別篩選（搜尋時隱藏） -->
		<div class="category-list"
			th:if="${keyword == null or #strings.isEmpty(keyword)}">
			<a href="/shop"
				style="padding: 9px 22px; border-radius: 4px; font-size: 13px; text-decoration: none; letter-spacing: 2px; transition: all 0.2s;"
				th:style="${selectedCategoryId == null} ? 'background:#2d5a6b; color:#fff; border:1px solid #2d5a6b;' : 'background:transparent; color:#5a7a8a; border:1px solid #c8dae0;'">
				全部商品 </a> <a th:each="category : ${categoryListData}"
				th:href="@{/shop(categoryId=${category.productCategoryId})}"
				th:text="${category.productCategoryName}"
				style="padding: 9px 22px; border-radius: 4px; font-size: 13px; text-decoration: none; letter-spacing: 2px; transition: all 0.2s;"
				th:style="${selectedCategoryId == category.productCategoryId} ?
           'background:#c9a84c; color:#fff; border:1px solid #c9a84c;' :
           'background:transparent; color:#5a7a8a; border:1px solid #c8dae0;'">
			</a>
		</div>

		<!-- 無搜尋結果 -->
		<div class="no-result" th:if="${#lists.isEmpty(productsListData)}">
			<i class="fa-solid fa-magnifying-glass"></i> 找不到符合「<span
				th:text="${keyword}"></span>」的商品，請試試其他關鍵字。
		</div>

		<!-- 商品列表 -->
		<div class="shop-grid" th:if="${!#lists.isEmpty(productsListData)}">
			<div class="product-card" th:each="product : ${productsListData}">
				<th:block th:with="firstImg=${firstImageMap.get(product.productId)}">
					<div class="product-img-placeholder" th:if="${firstImg == null}">
						<i class="fa-solid fa-bag-shopping"></i>
					</div>
					<img th:if="${firstImg != null}"
						th:src="@{/shop/image/{id}(id=${firstImg.productImageId})}"
						style="width: 100%; height: 200px; object-fit: cover;">
				</th:block>
				<div class="product-body">
					<div class="product-name" th:text="${product.productName}">商品名稱</div>
					<div class="product-desc" th:text="${product.productDesc}">商品介紹</div>
					<div class="product-footer">
						<div class="product-price">
							NT$ <span th:text="${product.productPrice}">0</span>
						</div>
						<a th:href="@{/shop/{id}(id=${product.productId})}"
							class="btn-detail">查看詳情</a>
					</div>
				</div>
			</div>
		</div>
	</div>

	<footer class="site-footer">
		<span>© 2026 東方之星 The Star．All Rights Reserved</span>
	</footer>

	<script src="/js/header-auth.js"></script>
</body>
</html>
