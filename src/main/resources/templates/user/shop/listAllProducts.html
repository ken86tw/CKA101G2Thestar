<!DOCTYPE html>
<html lang="zh-Hant" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>東方之星 The Star｜飯店精選商品</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@500;700&family=Noto+Sans+TC:wght@300;400;500;700&family=Cormorant+Garamond:ital,wght@1,400;1,600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/common.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Noto Sans TC', sans-serif; background: #f5f8fa; color: #2c3e50; }
    /* 購物頁 navbar 樣式 */
    .shop-navbar { position: fixed; top: 0; left: 0; right: 0; z-index: 100; background: rgba(30,45,55,0.92); backdrop-filter: blur(8px); height: 88px; border-bottom: 1px solid rgba(201,168,76,0.2); }
.shop-navbar .navbar-brand { display: flex; flex-direction: column; justify-content: center; align-self: center; height: 88px; padding-left: 8px; }
    .shop-navbar { flex-direction: row !important; align-items: center !important; padding: 0 61px !important; }
.shop-navbar .navbar-links { align-items: center; flex-direction: row !important; }
.shop-navbar .navbar-links > a { color: #c9d8e0; }
    .shop-navbar .navbar-links > a:hover { color: #fff; }
    .shop-navbar .navbar-links > a.active { color: #c9a84c; }
    .shop-navbar .navbar-login { color: #fff; }
.shop-navbar #loginLink { border: 1px solid #c9a84c !important; padding: 6px 16px !important; border-radius: 4px !important; color: #c9a84c !important; font-size: 14px; letter-spacing: 1px; }
.shop-navbar #loginLink:hover { background: #c9a84c !important; color: #fff !important; }
    
    .hero { background: linear-gradient(135deg, #1e3a4a 0%, #2d5a6b 50%, #1a2f3a 100%); padding: 140px 0 80px; text-align: center; position: relative; overflow: hidden; }
    .hero::before { content: ''; position: absolute; inset: 0; background: radial-gradient(ellipse at center, rgba(201,168,76,0.08) 0%, transparent 70%); }
    .hero-content { position: relative; z-index: 1; }
    .hero-en { font-family: 'Cormorant Garamond', serif; font-style: italic; font-size: 1rem; color: #c9a84c; letter-spacing: 4px; margin-bottom: 12px; }
    .hero h1 { font-family: 'Noto Serif TC', serif; font-size: 2.4rem; font-weight: 700; color: #fff; letter-spacing: 6px; margin-bottom: 16px; }
    .gold-line { width: 60px; height: 2px; background: linear-gradient(90deg, transparent, #c9a84c, transparent); margin: 16px auto; }
    .hero p { color: #a8c4d0; font-size: 15px; letter-spacing: 2px; }
    .shop-container { max-width: 1200px; margin: 48px auto; padding: 0 32px; }
    .section-header { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 32px; }
    .section-title { font-family: 'Noto Serif TC', serif; font-size: 1.3rem; color: #1e3a4a; letter-spacing: 2px; }
    .shop-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 24px; }
    .product-card { background: #fff; border: 1px solid #dce8ed; border-radius: 8px; overflow: hidden; transition: all 0.3s; }
    .product-card:hover { box-shadow: 0 12px 40px rgba(30,58,74,0.12); transform: translateY(-3px); }
    .product-img-placeholder { height: 200px; background: linear-gradient(135deg, #e8f2f6 0%, #d0e4ed 100%); display: flex; align-items: center; justify-content: center; }
    .product-img-placeholder i { font-size: 48px; color: #a0c0cc; opacity: 0.5; }
    .product-body { padding: 20px; }
    .product-name { font-family: 'Noto Serif TC', serif; font-size: 16px; font-weight: 700; color: #1e3a4a; margin-bottom: 8px; line-height: 1.4; }
    .product-desc { font-size: 13px; color: #7a9aaa; line-height: 1.7; margin-bottom: 16px; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
    .product-footer { display: flex; justify-content: space-between; align-items: center; padding-top: 16px; border-top: 1px solid #eef4f7; }
    .product-price { font-size: 20px; font-weight: 700; color: #c9a84c; }
    .btn-detail { background: #2d5a6b; color: #fff; border: 0; padding: 9px 20px; font-size: 13px; cursor: pointer; letter-spacing: 1px; text-decoration: none; border-radius: 4px; transition: background 0.2s; }
    .btn-detail:hover { background: #1e3a4a; color: #fff; }
    /* 搜尋框 */
    .search-bar { display: flex; gap: 8px; margin-bottom: 24px; }
    .search-bar input { flex: 1; padding: 10px 16px; border: 1px solid #dce8ed; border-radius: 4px; font-size: 14px; color: #2c3e50; outline: none; transition: border-color 0.2s; }
    .search-bar input:focus { border-color: #2d5a6b; }
    .search-bar button { background: #2d5a6b; color: #fff; border: 0; padding: 10px 20px; border-radius: 4px; font-size: 14px; cursor: pointer; transition: background 0.2s; letter-spacing: 1px; }
    .search-bar button:hover { background: #1e3a4a; }
    .search-clear { background: transparent; color: #7a9aaa; border: 1px solid #dce8ed; padding: 10px 16px; border-radius: 4px; font-size: 13px; cursor: pointer; text-decoration: none; transition: all 0.2s; white-space: nowrap; }
    .search-clear:hover { border-color: #2d5a6b; color: #2d5a6b; }
    /* 搜尋結果提示 */
    .search-info { background: #f0f7fa; border: 1px solid #dce8ed; border-radius: 4px; padding: 10px 16px; margin-bottom: 24px; font-size: 13px; color: #5a7a8a; }
    /* 無結果 */
    .no-result { text-align: center; padding: 80px 0; color: #a0b8c0; }
    .no-result i { font-size: 48px; display: block; margin-bottom: 16px; opacity: 0.4; }
    footer { background: #1e3a4a; color: #7a9aaa; text-align: center; padding: 40px 32px; font-size: 13px; margin-top: 80px; }
    .footer-brand { font-family: 'Noto Serif TC', serif; font-size: 16px; color: #c9a84c; letter-spacing: 4px; margin-bottom: 8px; }
    .footer-en { font-family: 'Cormorant Garamond', serif; font-style: italic; color: #5a8a9a; font-size: 14px; margin-bottom: 16px; }
    .footer-divider { width: 40px; height: 1px; background: #c9a84c; margin: 12px auto; opacity: 0.4; }
  

</style>
</head>
<body>

<nav class="navbar shop-navbar">
  <a href="/index.html" class="navbar-brand">
    <span class="brand-zh">東方之星</span>
    <span class="brand-en">The Star</span>
  </a>
  <div class="navbar-links">
    <a href="/index.html">首頁</a>
    <a href="/index.html#about-preview">關於我們</a>
    <a href="/articles.html">文章</a>
    <a href="/roombooking.html">訂房</a>
    <a href="/restaurant">餐廳</a>
    <a href="/facilities.html">設施</a>
    <a href="/index.html#faq">FAQ</a>
    <a href="/shop" class="active">購物</a>
    <a href="/shop/cart" class="cart-link" title="購物車" aria-label="購物車">
      <i class="fa-solid fa-cart-shopping"></i>
    </a>
    <div class="nav-actions">
      <button class="notify-btn" id="notifyBtn" type="button" title="通知">
        <i class="fa-regular fa-bell"></i>
        <span class="notify-dot" id="notifyDot"></span>
      </button>
      <a href="/login.html" class="navbar-login" id="loginLink" style="display: none;">登入</a>
      <div class="member-menu" id="memberMenu" style="display: none;">
        <button class="member-avatar" id="memberAvatar" type="button" title="會員選單">
          <i class="fa-regular fa-user"></i>
        </button>
        <div class="member-dropdown" id="memberDropdown">
          <div class="member-greeting" id="memberGreeting">貴賓，會員</div>
          <a href="/profile.html">我的會員資料</a>
          <a href="/roombooking.html?tab=orders">我的訂房預訂</a>
          <a href="#" class="js-coming-soon" data-message="我的餐廳預訂頁尚未完成">我的餐廳預訂</a>
          <a href="/shop/order/myOrders">我的購物訂單</a>
          <a href="#" class="js-coming-soon" data-message="我的優惠券頁尚未完成">我的優惠券</a>
          <button type="button" id="logoutBtn">登出</button>
        </div>
      </div>
    </div>
  </div>
</nav>

<div class="hero">
  <div class="hero-content">
    <div class="hero-en">HOTEL BOUTIQUE</div>
    <h1>飯店精選商品</h1>
    <div class="gold-line"></div>
    <p>嚴選伴手禮與旅遊好物，帶走最美好的回憶</p>
  </div>
</div>

<div class="shop-container">
  <div class="section-header">
    <div class="section-title"
      th:text="${keyword != null and !#strings.isEmpty(keyword)} ? '搜尋結果：' + ${keyword} : (${selectedCategoryId == null} ? '全部商品' : '篩選結果')">
      全部商品
    </div>
    <div style="font-size:13px; color:#7a9aaa;" th:text="${#lists.size(productsListData)} + ' 件商品'"></div>
  </div>

  <!-- 搜尋框 -->
  <form action="/shop" method="get" class="search-bar">
    <input type="text" name="keyword" placeholder="搜尋商品名稱或介紹..."
      th:value="${keyword}">
    <button type="submit"><i class="fa-solid fa-magnifying-glass me-1"></i>搜尋</button>
    <a href="/shop" class="search-clear"
      th:if="${keyword != null and !#strings.isEmpty(keyword)}">
      <i class="fa-solid fa-xmark me-1"></i>清除
    </a>
  </form>

  <!-- 搜尋結果提示 -->
  <div class="search-info"
    th:if="${keyword != null and !#strings.isEmpty(keyword)}"
    th:text="'搜尋「' + ${keyword} + '」，共找到 ' + ${#lists.size(productsListData)} + ' 件商品'">
  </div>

  <!-- 類別篩選（搜尋時隱藏） -->
  <div th:if="${keyword == null or #strings.isEmpty(keyword)}"
    style="display:flex; gap:10px; flex-wrap:wrap; margin-bottom:40px; padding-bottom:24px; border-bottom:1px solid #dce8ed;">
    <a href="/shop"
       style="padding:9px 22px; border-radius:4px; font-size:13px; text-decoration:none; letter-spacing:2px; transition:all 0.2s;"
       th:style="${selectedCategoryId == null} ? 'background:#2d5a6b; color:#fff; border:1px solid #2d5a6b;' : 'background:transparent; color:#5a7a8a; border:1px solid #c8dae0;'">
        全部商品
    </a>
    <a th:each="category : ${categoryListData}"
       th:href="@{/shop(categoryId=${category.productCategoryId})}"
       th:text="${category.productCategoryName}"
       style="padding:9px 22px; border-radius:4px; font-size:13px; text-decoration:none; letter-spacing:2px; transition:all 0.2s;"
       th:style="${selectedCategoryId == category.productCategoryId} ?
           'background:#c9a84c; color:#fff; border:1px solid #c9a84c;' :
           'background:transparent; color:#5a7a8a; border:1px solid #c8dae0;'">
    </a>
  </div>

  <!-- 無搜尋結果 -->
  <div class="no-result" th:if="${#lists.isEmpty(productsListData)}">
    <i class="fa-solid fa-magnifying-glass"></i>
    找不到符合「<span th:text="${keyword}"></span>」的商品，請試試其他關鍵字。
  </div>

  <!-- 商品列表 -->
  <div class="shop-grid" th:if="${!#lists.isEmpty(productsListData)}">
    <div class="product-card" th:each="product : ${productsListData}">
      <th:block th:with="firstImg=${firstImageMap.get(product.productId)}">
        <div class="product-img-placeholder" th:if="${firstImg == null}">
          <i class="fa-solid fa-bag-shopping"></i>
        </div>
        <img th:if="${firstImg != null}"
             th:src="@{/shop/image/{id}(id=${firstImg.productImageId})}"
             style="width:100%; height:200px; object-fit:cover;">
      </th:block>
      <div class="product-body">
        <div class="product-name" th:text="${product.productName}">商品名稱</div>
        <div class="product-desc" th:text="${product.productDesc}">商品介紹</div>
        <div class="product-footer">
          <div class="product-price">
            NT$ <span th:text="${product.productPrice}">0</span>
          </div>
          <a th:href="@{/shop/{id}(id=${product.productId})}" class="btn-detail">查看詳情</a>
        </div>
      </div>
    </div>
  </div>
</div>

<footer>
  <div class="footer-brand">東方之星</div>
  <div class="footer-en">The Star Resort Hotel</div>
  <div class="footer-divider"></div>
  <div>© 2026 東方之星 The Star．All Rights Reserved</div>
</footer>

<script src="/js/header-auth.js"></script>
</body>
</html>
