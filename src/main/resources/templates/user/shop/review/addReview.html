<!DOCTYPE html>
<html lang="zh-Hant" xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>東方之星 The Star｜寫評論</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@500;700&family=Noto+Sans+TC:wght@300;400;500;700&family=Cormorant+Garamond:ital,wght@1,400;1,600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/css/common.css">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: 'Noto Sans TC', sans-serif; background: #f5f8fa; color: #2c3e50; }
.shop-navbar { position: fixed; top: 0; left: 0; right: 0; z-index: 100; background: rgba(30,45,55,0.92); backdrop-filter: blur(8px); height: 88px; border-bottom: 1px solid rgba(201,168,76,0.2); }
.page-header { background: linear-gradient(135deg, #1e3a4a 0%, #2d5a6b 50%, #1a2f3a 100%); padding: 140px 0 80px; text-align: center; }
.page-header h1 { font-family: 'Noto Serif TC', serif; font-size: 2rem; color: #fff; letter-spacing: 6px; }
.gold-line { width: 60px; height: 2px; background: linear-gradient(90deg, transparent, #c9a84c, transparent); margin: 16px auto; }
.review-container { max-width: 600px; margin: 48px auto 80px; padding: 0 32px; }
.review-card { background: #fff; border: 1px solid #dce8ed; border-radius: 8px; padding: 32px; }
.product-name { font-family: 'Noto Serif TC', serif; font-size: 1.2rem; color: #1e3a4a; margin-bottom: 24px; padding-bottom: 16px; border-bottom: 1px solid #f0f5f8; }
.form-label { font-size: 13px; color: #5a7a8a; letter-spacing: 1px; margin-bottom: 8px; display: block; }
.star-rating { display: flex; flex-direction: row-reverse; justify-content: flex-end; gap: 4px; margin-bottom: 24px; }
.star-rating input { display: none; }
.star-rating label { font-size: 32px; color: #dce8ed; cursor: pointer; transition: color 0.2s; }
.star-rating input:checked ~ label,
.star-rating label:hover,
.star-rating label:hover ~ label { color: #c9a84c; }
.review-textarea { width: 100%; padding: 12px 16px; border: 1px solid #dce8ed; border-radius: 4px; font-family: 'Noto Sans TC', sans-serif; font-size: 14px; color: #2c3e50; resize: vertical; min-height: 120px; outline: none; transition: border-color 0.2s; }
.review-textarea:focus { border-color: #c9a84c; }
.btn-submit { width: 100%; background: #2d5a6b; color: #fff; border: none; padding: 14px; border-radius: 4px; font-size: 15px; letter-spacing: 2px; cursor: pointer; transition: background 0.2s; margin-top: 24px; }
.btn-submit:hover { background: #1e3a4a; }
.btn-back { display: inline-block; color: #7a9aaa; font-size: 13px; text-decoration: none; margin-bottom: 20px; }
.btn-back:hover { color: #2d5a6b; }
footer { background: #1e3a4a; color: #7a9aaa; text-align: center; padding: 40px 32px; font-size: 13px; }
.footer-brand { font-family: 'Noto Serif TC', serif; font-size: 16px; color: #c9a84c; letter-spacing: 4px; margin-bottom: 8px; }
.footer-en { font-family: 'Cormorant Garamond', serif; font-style: italic; color: #5a8a9a; font-size: 14px; margin-bottom: 16px; }
.footer-divider { width: 40px; height: 1px; background: #c9a84c; margin: 12px auto; opacity: 0.4; }
</style>
</head>
<body>

<div th:replace="~{user/common/frontNavbar :: navbar('shop', true, 'shop-navbar site-navbar-dark', false)}"></div>

<div class="page-header">
    <h1>寫評論</h1>
    <div class="gold-line"></div>
</div>

<div class="review-container">
    <a href="/shop/order/myOrders" class="btn-back">
        <i class="fa-solid fa-arrow-left me-1"></i>返回我的訂單
    </a>

    <div class="review-card">
        <div class="product-name">
            <i class="fa-solid fa-bag-shopping me-2" style="color:#c9a84c;"></i>
            <span th:text="${orderItem.product != null ? orderItem.product.productName : '商品'}"></span>
        </div>

        <form th:action="@{/shop/review/submit}" method="post">
            <input type="hidden" name="productOrderItemId"
                th:value="${orderItem.productOrderItemId}" />

            <!-- 星星評分 -->
            <label class="form-label">評分</label>
            <div class="star-rating">
                <input type="radio" id="star5" name="productRate" value="5" required />
                <label for="star5"><i class="fa-solid fa-star"></i></label>
                <input type="radio" id="star4" name="productRate" value="4" />
                <label for="star4"><i class="fa-solid fa-star"></i></label>
                <input type="radio" id="star3" name="productRate" value="3" />
                <label for="star3"><i class="fa-solid fa-star"></i></label>
                <input type="radio" id="star2" name="productRate" value="2" />
                <label for="star2"><i class="fa-solid fa-star"></i></label>
                <input type="radio" id="star1" name="productRate" value="1" />
                <label for="star1"><i class="fa-solid fa-star"></i></label>
            </div>

            <!-- 評論內容 -->
            <label class="form-label" style="margin-top:8px;">評論內容（選填）</label>
            <textarea class="review-textarea" name="productReview"
                placeholder="分享您的使用心得..."></textarea>

            <button type="submit" class="btn-submit">
                <i class="fa-solid fa-paper-plane me-2"></i>送出評論
            </button>
        </form>
    </div>
</div>

<footer>
    <div class="footer-brand">東方之星</div>
    <div class="footer-en">The Star Resort Hotel</div>
    <div class="footer-divider"></div>
    <div>© 2026 東方之星 The Star．All Rights Reserved</div>
</footer>

<script src="/js/header-auth.js"></script>
</body>
</html>
