<!DOCTYPE html>
<html lang="zh-Hant" xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title th:text="${productsVO.productName} + '｜東方之星 The Star'">商品詳情｜東方之星</title>
<link rel="stylesheet"
	href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
<link
	href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@500;700&family=Noto+Sans+TC:wght@300;400;500;700&family=Cormorant+Garamond:ital,wght@1,400;1,600&display=swap"
	rel="stylesheet">
<link rel="stylesheet" href="/css/common.css">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: 'Noto Sans TC', sans-serif; background: #f5f8fa; color: #2c3e50; }
/* 購物頁 navbar 樣式 */
.shop-navbar { position: fixed; top: 0; left: 0; right: 0; z-index: 100; background: rgba(30,45,55,0.92); backdrop-filter: blur(8px); height: 88px; border-bottom: 1px solid rgba(201,168,76,0.2); }
.shop-navbar .navbar-brand { display: flex; flex-direction: column; justify-content: center; align-self: center; height: 88px; padding-left: 8px; }
.shop-navbar { flex-direction: row !important; align-items: center !important; padding: 0 61px !important; }
.shop-navbar .navbar-links { align-items: center; flex-direction: row !important; }
.shop-navbar .navbar-links > a { color: #c9d8e0; }
.shop-navbar .navbar-links > a:hover { color: #fff; }
.shop-navbar .navbar-links > a.active { color: #c9a84c; }
.shop-navbar .navbar-login { color: #fff; }
.shop-navbar #loginLink { border: 1px solid #c9a84c !important; padding: 6px 16px !important; border-radius: 4px !important; color: #c9a84c !important; font-size: 14px; letter-spacing: 1px; }
.shop-navbar #loginLink:hover { background: #c9a84c !important; color: #fff !important; }

/* ===== Navbar ===== */

/* ===== Breadcrumb ===== */
.breadcrumb-bar { background: #fff; border-bottom: 1px solid #dce8ed; padding: 14px 48px; margin-top: 88px; }
.breadcrumb-bar a { color: #7a9aaa; text-decoration: none; font-size: 13px; }
.breadcrumb-bar a:hover { color: #2d5a6b; }
.breadcrumb-bar span { color: #a0b8c0; font-size: 13px; margin: 0 8px; }
.breadcrumb-bar .current { color: #2d5a6b; font-size: 13px; }

/* ===== Detail ===== */
.detail-container { max-width: 1100px; margin: 48px auto; padding: 0 32px; display: grid; grid-template-columns: 1fr 1fr; gap: 48px; }
.product-img-area { background: linear-gradient(135deg, #e8f2f6 0%, #d0e4ed 100%); border-radius: 8px; display: flex; align-items: center; justify-content: center; min-height: 420px; border: 1px solid #dce8ed; }
.product-img-area i { font-size: 80px; color: #a0c0cc; opacity: 0.4; }
.img-gallery { border-radius: 8px; overflow: hidden; border: 1px solid #dce8ed; }
.img-main { width: 100%; height: 420px; object-fit: cover; transition: opacity 0.3s; }
.img-thumbs { display: flex; gap: 8px; padding: 12px; background: #f5f8fa; flex-wrap: wrap; }
.img-thumb { width: 80px; height: 60px; object-fit: cover; border-radius: 4px; cursor: pointer; border: 2px solid #dce8ed; transition: border-color 0.2s; }
.img-thumb:hover, .img-thumb.active { border-color: #c9a84c; }

/* ===== Product Info ===== */
.product-info { padding: 8px 0; }
.product-category-tag { display: inline-block; font-size: 11px; color: #7a9aaa; letter-spacing: 2px; text-transform: uppercase; border: 1px solid #dce8ed; padding: 4px 12px; border-radius: 20px; margin-bottom: 16px; }
.product-name { font-family: 'Noto Serif TC', serif; font-size: 1.8rem; font-weight: 700; color: #1e3a4a; letter-spacing: 2px; margin-bottom: 16px; line-height: 1.4; }
.gold-line { width: 40px; height: 2px; background: #c9a84c; margin-bottom: 24px; }
.product-desc { font-size: 15px; color: #5a7a8a; line-height: 1.9; margin-bottom: 32px; }
.product-price-area { background: #f0f7fa; border-radius: 8px; padding: 20px 24px; margin-bottom: 24px; border: 1px solid #dce8ed; }
.price-label { font-size: 12px; color: #7a9aaa; letter-spacing: 2px; margin-bottom: 6px; }
.price-value { font-size: 2rem; font-weight: 700; color: #c9a84c; }
.stats-row { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 12px; margin-bottom: 32px; }
.stat-item { text-align: center; background: #fff; border: 1px solid #dce8ed; border-radius: 8px; padding: 14px; }
.stat-label { font-size: 11px; color: #7a9aaa; letter-spacing: 1px; margin-bottom: 6px; }
.stat-value { font-size: 18px; font-weight: 700; color: #1e3a4a; }
.stat-value.stars { color: #c9a84c; }
.status-on { display: inline-flex; align-items: center; gap: 6px; background: #e8f5ee; color: #2d7a4a; font-size: 13px; padding: 6px 16px; border-radius: 20px; margin-bottom: 24px; }

/* ===== 庫存警告 ===== */
.stock-warning { display: none; background: #fff8e6; border: 1px solid #f0c040; border-radius: 6px; padding: 10px 16px; margin-bottom: 12px; font-size: 13px; color: #8a6a00; }
.stock-warning i { margin-right: 6px; }

/* ===== 購物車按鈕 ===== */
.btn-row { display: flex; align-items: center; gap: 12px; margin-bottom: 16px; }
.qty-input { width: 70px; padding: 10px; border: 1px solid #dce8ed; border-radius: 4px; font-size: 14px; text-align: center; }
.btn-cart { display: inline-flex; align-items: center; gap: 8px; background: #2d5a6b; color: #fff; border: 0; padding: 12px 24px; font-size: 14px; border-radius: 4px; cursor: pointer; letter-spacing: 1px; transition: background 0.2s; }
.btn-cart:hover { background: #1e3a4a; }
.btn-back { display: inline-flex; align-items: center; gap: 8px; background: transparent; color: #2d5a6b; border: 1px solid #2d5a6b; padding: 12px 24px; font-size: 14px; border-radius: 4px; text-decoration: none; transition: all 0.2s; letter-spacing: 1px; }
.btn-back:hover { background: #2d5a6b; color: #fff; }

/* ===== 評論區塊 ===== */
.reviews-section { max-width: 1100px; margin: 0 auto 80px; padding: 0 32px; }
.reviews-title { font-family: 'Noto Serif TC', serif; font-size: 1.2rem; color: #1e3a4a; letter-spacing: 2px; margin-bottom: 24px; padding-bottom: 12px; border-bottom: 2px solid #dce8ed; display: flex; align-items: center; gap: 12px; }
.reviews-title span { font-size: 13px; color: #7a9aaa; font-family: 'Noto Sans TC', sans-serif; font-weight: 400; letter-spacing: 0; }
.review-item { background: #fff; border: 1px solid #dce8ed; border-radius: 8px; padding: 20px 24px; margin-bottom: 16px; }
.review-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
.review-member { font-size: 14px; font-weight: 700; color: #1e3a4a; }
.review-stars { color: #c9a84c; font-size: 15px; }
.review-date { font-size: 12px; color: #a0b8c0; margin-top: 4px; }
.review-content { font-size: 14px; color: #5a7a8a; line-height: 1.8; margin-top: 10px; }
.review-empty { text-align: center; padding: 48px 0; color: #a0b8c0; font-size: 14px; }
.review-empty i { font-size: 36px; display: block; margin-bottom: 12px; opacity: 0.4; }

/* ===== Footer ===== */
footer { background: #1e3a4a; color: #7a9aaa; text-align: center; padding: 40px 32px; font-size: 13px; margin-top: 68px; }
.footer-brand { font-family: 'Noto Serif TC', serif; font-size: 16px; color: #c9a84c; letter-spacing: 4px; margin-bottom: 8px; }
.footer-en { font-family: 'Cormorant Garamond', serif; font-style: italic; color: #5a8a9a; font-size: 14px; margin-bottom: 16px; }
.footer-divider { width: 40px; height: 1px; background: #c9a84c; margin: 12px auto; opacity: 0.4; }

@media (max-width: 768px) {
	.detail-container { grid-template-columns: 1fr; }
	
	.breadcrumb-bar { padding: 14px 24px; }
	.reviews-section { padding: 0 24px; }
}

</style>
</head>
<body>

<div th:replace="~{user/common/frontNavbar :: navbar('shop', true, 'shop-navbar site-navbar-dark', false)}"></div>

<div class="breadcrumb-bar">
	<a href="/">首頁</a><span>›</span>
	<a href="/shop">精選商品</a><span>›</span>
	<span class="current" th:text="${productsVO.productName}">商品名稱</span>
</div>

<div class="detail-container">

	<!-- 圖片區 -->
	<div>
		<!-- 無圖片 -->
		<div class="product-img-area" th:if="${#lists.isEmpty(imageListData)}">
			<i class="fa-solid fa-bag-shopping"></i>
		</div>
		<!-- 有圖片 -->
		<div class="img-gallery" th:if="${!#lists.isEmpty(imageListData)}">
			<img class="img-main" id="mainImg"
				th:src="@{/shop/image/{id}(id=${coverImage != null ? coverImage.productImageId : imageListData[0].productImageId})}"
				alt="商品圖片">
			<!-- 縮圖列（多於1張才顯示） -->
			<div class="img-thumbs" th:if="${#lists.size(imageListData) > 1}">
				<img th:each="image,iterStat : ${imageListData}"
					th:src="@{/shop/image/{id}(id=${image.productImageId})}"
					th:class="${iterStat.first} ? 'img-thumb active' : 'img-thumb'"
					onclick="switchImage(this)" alt="商品縮圖">
			</div>
		</div>
	</div>

	<!-- 資訊區 -->
	<div class="product-info">

		<!-- 動態類別標籤 -->
		<div class="product-category-tag" th:text="${categoryName}">飯店精選商品</div>

		<div class="product-name" th:text="${productsVO.productName}">商品名稱</div>
		<div class="gold-line"></div>
		<div class="product-desc" th:text="${productsVO.productDesc}">商品介紹</div>

		<div class="product-price-area">
			<div class="price-label">售價</div>
			<div class="price-value">NT$ <th:block th:text="${productsVO.productPrice}">0</th:block></div>
		</div>

		<div class="stats-row">
			<div class="stat-item">
				<div class="stat-label">剩餘數量</div>
				<div class="stat-value" th:text="${productsVO.productQuantity}">0</div>
			</div>
			<div class="stat-item">
				<div class="stat-label">評價人數</div>
				<div class="stat-value" th:text="${productsVO.productReviewNumber}">0</div>
			</div>
			<div class="stat-item">
				<div class="stat-label">平均評分</div>
				<div class="stat-value stars">
					<span th:if="${productsVO.productReviewNumber == 0}">—</span>
					<span th:if="${productsVO.productReviewNumber > 0}"
						th:text="${#numbers.formatDecimal(productsVO.productTotalStar / productsVO.productReviewNumber, 1, 1)} + ' ★'"></span>
				</div>
			</div>
		</div>

		<div class="status-on" th:if="${productsVO.productStatus == 1}">
			<i class="fa-solid fa-circle-check"></i> 現貨供應中
		</div>

		<!-- 加入購物車 -->
		<form th:action="@{/shop/cart/add}" method="post">
			<input type="hidden" name="productId" th:value="${productsVO.productId}">
			<!-- 庫存超量提示（JS 控制顯示） -->
			<div class="stock-warning" id="stockWarning">
				<i class="fa-solid fa-triangle-exclamation"></i>
				您的購買數量超過現有庫存，我們仍會接受您的訂單，但可能需要較長的備貨時間，感謝您的耐心等待。
			</div>
			<div class="btn-row">
				<input type="number" name="qty" id="qtyInput" value="1" min="1"
					class="qty-input"
					th:attr="data-stock=${productsVO.productQuantity}"
					oninput="checkStock(this)">
				<button type="submit" class="btn-cart">
					<i class="fa-solid fa-cart-plus"></i> 加入購物車
				</button>
			</div>
		</form>

		<a href="/shop" class="btn-back">
			<i class="fa-solid fa-arrow-left"></i> 返回商品列表
		</a>
	</div>
</div>

<!-- ===== 評論區塊 ===== -->
<div class="reviews-section">
	<div class="reviews-title">
		顧客評論
		<span th:text="'（共 ' + ${#lists.size(reviewListData)} + ' 則）'">（共 0 則）</span>
	</div>

	<!-- 沒有評論 -->
	<div class="review-empty" th:if="${#lists.isEmpty(reviewListData)}">
		<i class="fa-regular fa-comment-dots"></i>
		目前尚無評論，成為第一個分享心得的人吧！
	</div>

	<!-- 評論列表 -->
	<div th:each="review : ${reviewListData}" class="review-item">
		<div class="review-header">
			<div>
				<div class="review-member">
					<i class="fa-regular fa-user me-1"></i>
					<!-- 等會員組串接後改成顯示會員名稱 -->
					會員 #<span th:text="${review.memberId}"></span>
				</div>
				<div class="review-date" th:text="${#temporals.format(review.productReviewDate, 'yyyy-MM-dd')}"></div>
			</div>
			<div class="review-stars">
				<!-- 根據星數動態顯示實心/空心星星 -->
				<th:block th:each="i : ${#numbers.sequence(1, 5)}">
					<i th:class="${i <= review.productRate} ? 'fa-solid fa-star' : 'fa-regular fa-star'"></i>
				</th:block>
			</div>
		</div>
		<div class="review-content" th:text="${review.productReview}"></div>
	</div>
</div>

<footer>
	<div class="footer-brand">東方之星</div>
	<div class="footer-en">The Star Resort Hotel</div>
	<div class="footer-divider"></div>
	<div>© 2026 東方之星 The Star．All Rights Reserved</div>
</footer>

<script>
// 縮圖切換主圖
function switchImage(thumb) {
	document.getElementById('mainImg').src = thumb.src;
	document.querySelectorAll('.img-thumb').forEach(t => t.classList.remove('active'));
	thumb.classList.add('active');
}

// 數量超過庫存時顯示提示
function checkStock(input) {
	const stock = parseInt(input.getAttribute('data-stock')) || 0;
	const qty = parseInt(input.value) || 1;
	const warning = document.getElementById('stockWarning');
	warning.style.display = (qty > stock) ? 'block' : 'none';
}
</script>

<script src="/js/header-auth.js"></script>
</body>
</html>
