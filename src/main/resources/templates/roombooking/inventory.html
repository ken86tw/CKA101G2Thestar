<!DOCTYPE html>

<html lang="zh-Hant" xmlns:th="http://www.thymeleaf.org">
<body>

<section th:fragment="section" v-if="employee.on && nav==='inv'">
    <div class="wrap">
        <div class="sechead">
            <div class="up">Inventory</div>
            <h2>庫存查詢</h2>
            <p>各房型未來 31 天的剩餘房量</p></div>
        <div class="panel">
            <div class="row" style="margin-bottom:14px;display:flex;gap:10px;align-items:center">
                <label>查詢起日</label>
                <input type="date" v-model="inv.date">
                <button class="btn sm" @click="loadInventory()">查詢</button>
            </div>

            <div v-if="invRows.length" class="invlegend">
                <span><i class="sw ok"></i>無預訂</span>
                <span><i class="sw low"></i>已有預訂</span>
                <span><i class="sw full"></i>滿房</span>
            </div>

            <div v-if="invRows.length" class="invscroll">
                <table class="invtable">
                    <thead>
                    <tr>
                        <th class="invdate">日期</th>
                        <th v-for="t in invTypes" :key="t">{{ t }}</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr v-for="row in invRows" :key="row.date">
                        <td class="invdate" :class="{wkend: invIsWeekend(row.date)}">
                            <b>{{ invMD(row.date) }}</b>
                            <small>{{ invWD(row.date) }}</small>
                            <em v-if="invIsToday(row.date)">今天</em>
                        </td>

                        <td v-for="(c, i) in row.cells" :key="i"
                            class="invcell" :class="invLevel(c)">
                            <div class="pipe">
                                <i class="fill" :style="{width: invPct(c)}"></i>
                                <span v-if="typeof c.remain !== 'number'" class="lbl">－</span>
                                <span v-else-if="c.remain === 0" class="lbl full-txt">滿房</span>
                                <span v-else class="lbl">剩 <b>{{ c.remain }}</b> 間</span>
                            </div>
                        </td>
                    </tr>
                    </tbody>
                </table>
            </div>
            <p v-else class="hint">選擇日期後按查詢</p>
        </div>
    </div>
</section>
</body>
</html>
