<!DOCTYPE html>
<html lang="zh-Hant" xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>東方之星 The Star｜首頁</title>
<link rel="stylesheet"
	href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link
	href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@500;700&family=Noto+Sans+TC:wght@300;400;500;700&family=Cormorant+Garamond:ital,wght@1,400;1,600&display=swap"
	rel="stylesheet">
<link rel="stylesheet" href="/css/common.css">
<link rel="stylesheet" href="/css/index.css">
<style>
[v-cloak] {
	display: none;
}

.login-btn-as-button {
	border: 0;
	cursor: pointer;
	font: inherit;
}

.login-modal-mask {
	position: fixed;
	inset: 0;
	z-index: 999;
	background: rgba(20, 18, 14, 0.46);
	display: flex;
	align-items: center;
	justify-content: center;
	padding: 24px;
}

.login-modal {
	width: min(420px, 92vw);
	background: #fffdf8;
	border: 1px solid #e5dccd;
	box-shadow: 0 20px 60px rgba(35, 33, 28, 0.2);
	padding: 36px;
	position: relative;
}

.login-modal-close {
	position: absolute;
	top: 14px;
	right: 14px;
	width: 34px;
	height: 34px;
	border: 0;
	border-radius: 50%;
	background: #f5efe5;
	color: #7f623b;
	cursor: pointer;
	font-size: 18px;
}

.login-modal h2 {
	margin: 0 0 8px;
	text-align: center;
	letter-spacing: 4px;
	color: #3a3329;
}

.login-modal-subtitle {
	margin: 0 0 28px;
	text-align: center;
	color: #8a8172;
	font-size: 14px;
}

.login-field {
	margin-bottom: 18px;
}

.login-field label {
	display: block;
	margin-bottom: 8px;
	font-size: 13px;
	color: #8a8172;
}

.login-field input {
	width: 100%;
	border: 1px solid #ddd4c6;
	background: #fff;
	padding: 13px 14px;
	font-size: 15px;
	border-radius: 4px;
	box-sizing: border-box;
}

.login-submit {
	width: 100%;
	border: 0;
	background: #9c7c4f;
	color: #fff;
	padding: 14px;
	font-size: 15px;
	letter-spacing: 2px;
	cursor: pointer;
}

.login-submit:disabled {
	opacity: 0.65;
	cursor: not-allowed;
}

.login-message {
	min-height: 22px;
	margin-top: 16px;
	text-align: center;
	color: #a85b50;
	font-size: 14px;
}

.login-modal-register {
	display: block;
	margin-top: 12px;
	text-align: center;
	color: #9c7c4f;
	font-weight: 700;
}

.login-remember {
	display: inline-flex;
	align-items: center;
	gap: 8px;
	margin: -4px 0 18px;
	color: #7f6b50;
	font-size: 14px;
	cursor: pointer;
}

.login-remember input {
	width: 16px;
	height: 16px;
	accent-color: #9c7c4f;
}

.login-resend-box {
	margin-top: 14px;
	padding: 14px 16px;
	border: 1px solid #eadbc6;
	background: #fff9ef;
	text-align: center;
	color: #8a6b40;
	font-size: 14px;
}

.login-resend-box p {
	margin: 0 0 10px;
}

.login-resend-btn {
	width: 100%;
	border: 1px solid #b08b55;
	background: #fffdf8;
	color: #9c7c4f;
	padding: 10px 12px;
	font-weight: 700;
	cursor: pointer;
}

.login-resend-btn:disabled {
	opacity: 0.65;
	cursor: not-allowed;
}

.login-success-message {
	min-height: 22px;
	margin-top: 12px;
	text-align: center;
	color: #4f8a57;
	font-size: 14px;
}

.login-modal-links {
	margin-top: 18px;
	text-align: center;
	line-height: 1.9;
	color: #8a8172;
	font-size: 14px;
}

.login-modal-links a {
	margin-left: 8px;
	color: #9c7c4f;
	font-weight: 700;
	text-decoration: none;
}

.login-modal-links a:hover {
	text-decoration: underline;
}
</style>
</head>
<body>
	<div id="app" v-cloak>
		<header :class="currentPage === 'home' ? 'hero' : 'page-header'"
			id="home">
			<div
				th:replace="~{user/common/frontNavbar :: navbar('home', false, '', true)}"></div>

			<div class="hero-content" v-if="currentPage === 'home'">
				<h2>東方之星度假飯店</h2>
				<p>享受墾丁海岸的陽光、沙灘與慢步調假期</p>
				<div class="gold-line"></div>
				<div class="hero-buttons">
					<a href="/roombooking.html" class="btn primary-btn">立即訂房</a>
				</div>
			</div>

		</header>

		<main>
			<template v-if="currentPage === 'home'">
				<section class="section" id="about-preview">
					<h2 class="section-title">關於東方之星</h2>
					<div class="gold-line"></div>
					<p class="intro">東方之星 The Star
						以海景度假飯店為主題，結合舒適客房、精緻餐飲、購物服務與休閒設施， 讓旅客能在同一個平台完成訂房、用餐、購物與設施查詢。</p>
					<div class="about-preview-more">
					    <a href="/about.html" class="about-story-link">
					        閱讀品牌故事
					        <i class="fa-solid fa-arrow-right"></i>
					    </a>
					</div>

					<div class="feature-grid">
						<article class="feature-card">
							<div class="feature-img room-img"></div>
							<div class="feature-body">
								<i class="fa-solid fa-bed"></i>
								<h3>舒適訂房</h3>
								<p>查看房型、空房與住宿資訊，快速安排理想假期。</p>
								<a href="/roombooking.html" class="text-link">查看房型</a>
							</div>
						</article>

						<article class="feature-card">
							<div class="feature-img restaurant-img"></div>
							<div class="feature-body">
								<i class="fa-solid fa-utensils"></i>
								<h3>餐廳服務</h3>
								<p>提供飯店餐飲資訊，讓旅客輕鬆安排用餐時段。</p>
								<a href="/restaurant" class="text-link">了解餐廳</a>
							</div>
						</article>

						<article class="feature-card">
							<div class="feature-img shop-img"></div>
							<div class="feature-body">
								<i class="fa-solid fa-bag-shopping"></i>
								<h3>購物服務</h3>
								<p>旅客可瀏覽飯店精選商品，包含伴手禮、旅遊用品與住宿相關服務。</p>
								<a href="/shop" class="text-link">前往購物</a>
							</div>
						</article>

						<article class="feature-card">
							<div class="feature-img facility-img"></div>
							<div class="feature-body">
								<i class="fa-solid fa-person-swimming"></i>
								<h3>飯店設施</h3>
								<p>包含泳池、SPA、健身房與更多休閒服務。</p>
								<a href="/facilities.html" class="text-link">前往設施頁</a>
							</div>
						</article>
					</div>
				</section>

				<section class="section news-section" id="news">
					<h2 class="section-title">最新消息</h2>
					<div class="gold-line"></div>
					<div class="news-box">
						<div class="news-item" th:each="news : ${latestNews}">
							<time class="news-date" th:datetime="${news.createAt}"
								th:text="${#temporals.format(news.createAt, 'yyyy/MM/dd')}">2026/05/19</time>
							<a class="news-title"
								th:href="@{/articles.html(article=${news.articleId})}"
								th:text="${news.title}">公告標題</a>
						</div>
						<p class="news-empty" th:if="${#lists.isEmpty(latestNews)}">目前尚無公告。</p>
						<div class="news-more">
							<a href="/articles.html" class="text-link">查看全部公告</a>
						</div>
					</div>
				</section>

				<section class="section shop-faq" id="faq">
    <h2 class="section-title">FAQ</h2>
    <div class="gold-line"></div>

    <div class="simple-grid" id="faq-app">
        <article class="simple-card faq-card">
            <div class="faq-intro">
                <h3>常見問題</h3>
                <p>整理訂房、入住、設施使用、購物與付款相關問題，方便旅客快速查看。</p>
            </div>

            <div class="faq-content">
                <div v-for="(item, index) in faqList"
                     :key="index"
                     class="faq-item">

                    <button class="faq-question"
                            @click="toggleFaq(index)"
                            :class="{ 'active': faqActiveIndex === index }">
                        {{ index + 1 }}. {{ item.question }}

                        <span>
                            {{ faqActiveIndex === index ? '▲' : '▼' }}
                        </span>
                    </button>

                    <div class="faq-answer"
                         v-show="faqActiveIndex === index">
                        <p style="white-space: pre-line;">
                            {{ item.answer }}
                        </p>
                    </div>
                </div>
            </div>
        </article>
    </div>
</section>


				<!--  <section class="section shop-faq" id="faq">
					<h2 class="section-title">FAQ</h2>
					<div class="gold-line"></div>
					<div class="simple-grid">
						<article class="simple-card">
							<h3>常見問題</h3>
							<p>整理訂房、入住、設施使用、購物與付款相關問題，方便旅客快速查看。</p>
						</article>
					</div>
				</section> -->

				<section class="cta">
					<div>
						<h2>開啟您的度假旅程</h2>
						<p>立即預訂，體驗東方之星的海岸假期</p>
						<a href="/roombooking.html" class="btn primary-btn">立即訂房</a>
					</div>
				</section>
			</template>

		</main>


		<div class="offer-popup-mask" v-if="offerPopupOpen"
			@click.self="closeOfferPopup">
			<section class="offer-popup" role="dialog" aria-modal="true"
				aria-labelledby="offerPopupTitle">
				<button class="offer-popup-close" type="button"
					aria-label="關閉限時優惠" @click="closeOfferPopup">×</button>

				<div class="offer-popup-visual" aria-hidden="true">
					<span class="offer-popup-badge">我是廣告</span>
					<i class="fa-solid fa-umbrella-beach"></i>
				</div>

				<div class="offer-popup-content">
					<p class="offer-popup-eyebrow">東方之星夏日限定</p>
					<h2 id="offerPopupTitle">限時住房優惠</h2>
					<p style="color: red;">(以後可以跟其他商家或廣告商結合)</p>
					<p class="offer-popup-description">
						立即規劃墾丁海岸假期，登入會員即可查看可使用的專屬優惠券。
					</p>
					<p class="offer-popup-period">
						<i class="fa-regular fa-clock"></i>
						活動期間至 2026 / 08 / 31
					</p>
					<a class="offer-popup-action" href="/roombooking.html">
						立即查看空房
						<i class="fa-solid fa-arrow-right"></i>
					</a>
					<p class="offer-popup-note">實際優惠內容與使用資格以會員優惠券頁面顯示為準</p>
				</div>
			</section>
		</div>

		<div class="login-modal-mask" v-if="loginModalOpen"
			@click.self="closeLoginModal">
			<section class="login-modal" role="dialog" aria-modal="true"
				aria-label="會員登入">
				<button class="login-modal-close" type="button"
					@click="closeLoginModal">×</button>
				<h2>會員登入</h2>
				<p class="login-modal-subtitle">東方之星 The Star</p>

				<form @submit.prevent="loginMember" autocomplete="on">
					<div class="login-field">
						<label for="loginEmail">會員信箱</label> <input id="loginEmail"
							type="email" v-model.trim="loginForm.memberEmail"
							autocomplete="username" required>
					</div>

					<div class="login-field">
						<label for="loginPassword">會員密碼</label> <input id="loginPassword"
							type="password" v-model="loginForm.memberPassword"
							autocomplete="current-password" required>
					</div>

					<label class="login-remember"> <input type="checkbox"
						v-model="loginForm.rememberMe"> <span>記住帳號</span>
					</label>

					<button class="login-submit" type="submit" :disabled="loginLoading">
						{{ loginLoading ? '登入中...' : '登入' }}</button>

					<div class="login-message">{{ loginMessage }}</div>

					<div v-if="showResendVerify" class="login-resend-box">
						<p>這個帳號還沒完成信箱驗證。</p>
						<button type="button" class="login-resend-btn"
							:disabled="resending" @click="resendVerification">{{
							resending ? '寄送中...' : '重送驗證信' }}</button>
					</div>

					<div class="login-success-message">{{ loginSuccessMessage }}</div>
				</form>

				<div class="login-modal-links">
					<div>
						<a href="/register.html">還沒有帳號 註冊會員</a>
					</div>
					<div>
						<a href="/forgot-password.html">無法登入 忘記密碼</a>
					</div>
<!-- 					<div> -->
<!-- 						回到網站 <a href="/index.html">回首頁</a> -->
<!-- 					</div> -->
				</div>
			</section>
		</div>
	</div>

	<script src="https://unpkg.com/vue@3/dist/vue.global.prod.js"></script>
	<script>
  const { createApp, nextTick } = Vue;

  createApp({
    data() {
      return {
        currentPage: 'home',
        loggedIn: false,
        authReady: false,
        memberId: null,
        memberName: '',
        memberEmail: '',
        memberDropdownOpen: false,
        avatarLoadFailed: false,
        hasNotify: false,

        notificationPanelOpen: false,
        notifications: [],
        notificationUnreadCount: 0,
        notificationLoading: false,
        notificationTimer: null,

        offerPopupOpen: false,
        offerPopupTimer: null,

        loginModalOpen: false,
        loginLoading: false,
        resending: false,
        loginMessage: '',
        loginSuccessMessage: '',
        showResendVerify: false,
        loginForm: {
          memberEmail: '',
          memberPassword: '',
          rememberMe: false
        },
      
      faqActiveIndex: null,
      faqList: [
          { question: "什麼時候能辦理入住?", answer: "隨時都可以，線上辦理在此網頁上即可，現場入住可至飯店地點臨櫃辦理，依照當日住宿情況可能無空房，如有需要請先撥打電話向櫃台人員確認。" },
          { question: "有供應毛巾、牙刷和牙膏嗎?", answer: "有的，每間房都備有毛巾、牙刷、牙膏、沐浴乳等基本盥洗用具，如房內缺少、或需要更多，請向房務人員詢問喔。" },
          { question: "付款方式有哪些?", answer: "線上訂房僅限信用卡，現金付款只適用於臨櫃訂房。" },
          { question: "房內設施有什麼?", answer: "備有液晶電視、冷暖氣、小冰箱、衛浴設備、充電器等等，住宿期間提供Wifi網路使用，依照房型不同設備也會有所差異。" },
          { question: "飯店有停車場可用?需要付錢嗎?", answer: "住宿客免費使用，住宿期間可自由出入，到當日退房時間後的隔日下午13:00前為止，一般消費者請洽附近的公、私有停車場，目前飯店停車場僅供住宿客使用。" }
      ],
      
      };
    },

    computed: {
      displayName() {
        return this.memberName || '會員';
      }
    },

    mounted() {
      const initialAnchor = window.location.hash.replace('#', '');

      this.cleanIndexUrl();
      this.loadRememberedLogin();
      this.checkMemberStatus();
      this.scheduleOfferPopup();

      document.addEventListener('click', () => {
        this.memberDropdownOpen = false;
        this.notificationPanelOpen = false;
      });

      if (initialAnchor === 'about-preview' || initialAnchor === 'faq') {
        this.goHomeAnchor(initialAnchor);
      }
    },
    beforeUnmount() {
    	  this.stopNotificationPolling();
      if (this.offerPopupTimer !== null) {
        window.clearTimeout(this.offerPopupTimer);
      }
    },

    methods: {
      cleanIndexUrl() {
        if (location.pathname === '/index.html') {
          history.replaceState(null, '', '/');
        }
      },

      keepRootUrl() {
        if (location.pathname !== '/') {
          history.replaceState(null, '', '/');
        }
      },

//       goPage(page) {
//         this.currentPage = page;
//         this.memberDropdownOpen = false;
//         this.notificationPanelOpen = false;
//         this.keepRootUrl();
//         nextTick(function () {
//           window.scrollTo({
//             top: 0,
//             behavior: 'smooth'
//           });
//         });
//       },

      goHomeAnchor(anchorId) {
        this.currentPage = 'home';
        this.memberDropdownOpen = false;
        this.notificationPanelOpen = false;
        this.keepRootUrl();

        nextTick(function () {
          const target = document.getElementById(anchorId);

          if (target) {
            target.scrollIntoView({
              behavior: 'smooth'
            });
          }
        });
      },

      scheduleOfferPopup() {
        if (sessionStorage.getItem('theStarLimitedOfferClosed') === 'true') {
          return;
        }

        this.offerPopupTimer = window.setTimeout(() => {
          this.offerPopupOpen = true;
          this.offerPopupTimer = null;
        }, 700);
      },

      closeOfferPopup() {
        this.offerPopupOpen = false;
        sessionStorage.setItem('theStarLimitedOfferClosed', 'true');
      },

      loadRememberedLogin() {
        const rememberedEmail = localStorage.getItem('theStarRememberEmail') || '';
        localStorage.removeItem('theStarRememberPassword');

        this.loginForm.memberEmail = rememberedEmail;
        this.loginForm.memberPassword = '';
        this.loginForm.rememberMe = rememberedEmail !== '';
      },

      clearLoginMessages() {
        this.loginMessage = '';
        this.loginSuccessMessage = '';
        this.showResendVerify = false;
      },

      resetLoginFormForOpen() {
        this.loadRememberedLogin();
        this.clearLoginMessages();
      },

      async checkMemberStatus() {
    	  try {
    	    const res = await fetch('/api/member/status', {
    	      credentials: 'same-origin'
    	    });

    	    if (!res.ok) {
    	      this.clearMemberState();
    	      return;
    	    }

    	    const data = await res.json();

    	    this.loggedIn = data.loggedIn === true;
    	    this.memberId = data.memberId || null;
    	    this.memberName = data.memberName || '';
    	    this.memberEmail = data.memberEmail || '';
    	    this.avatarLoadFailed = false;

    	    if (this.loggedIn) {
    	      await this.loadNotifications();
    	      this.startNotificationPolling();
    	    } else {
    	      this.clearNotificationState();
    	    }

    	  } catch (e) {
    	    this.clearMemberState();

    	  } finally {
    	    this.authReady = true;
    	  }
    	},

      clearMemberState() {
        this.loggedIn = false;
        this.memberId = null;
        this.memberName = '';
        this.memberEmail = '';
        this.avatarLoadFailed = false;
        this.memberDropdownOpen = false;
        this.stopNotificationPolling();
        this.clearNotificationState();
      },

      toggleMemberMenu(event) {
        event.stopPropagation();
        this.notificationPanelOpen = false;
        this.memberDropdownOpen = !this.memberDropdownOpen;
      },

      openLoginModal() {
        this.resetLoginFormForOpen();
        this.loginModalOpen = true;
        this.memberDropdownOpen = false;
      },

      closeLoginModal() {
        if (this.loginLoading) {
          return;
        }

        this.loginModalOpen = false;
        this.clearLoginMessages();
        this.loginForm.memberPassword = '';
      },

      async loginMember() {
        this.loginLoading = true;
        this.loginMessage = '';

        try {
          const res = await fetch('/api/member/login', {
            method: 'POST',
            headers: {
              'Content-Type': 'application/json'
            },
            credentials: 'same-origin',
            body: JSON.stringify({
              memberEmail: this.loginForm.memberEmail,
              memberPassword: this.loginForm.memberPassword
            })
          });

          const data = await res.json().catch(function () {
            return {};
          });

          if (!res.ok) {
            this.loginMessage = data.error || '登入失敗';
            this.showResendVerify = this.loginMessage.includes('帳號尚未完成信箱驗證');
            return;
          }

          if (this.loginForm.rememberMe) {
            localStorage.setItem('theStarRememberEmail', this.loginForm.memberEmail);
            localStorage.removeItem('theStarRememberPassword');
          } else {
            localStorage.removeItem('theStarRememberEmail');
            localStorage.removeItem('theStarRememberPassword');
          }

          this.loggedIn = true;
          this.memberId = data.memberId || null;
          this.memberName = data.memberName || '';
          this.memberEmail = data.memberEmail || '';
          this.avatarLoadFailed = false;
          this.loginModalOpen = false;
          this.clearLoginMessages();
          this.keepRootUrl();
          await this.loadNotifications();
          this.startNotificationPolling();

        } catch (e) {
          this.loginMessage = '無法連線到伺服器';

        } finally {
          this.loginLoading = false;
        }
      },

      async logoutMember() {
    	  try {
    	    await fetch('/api/member/logout', {
    	      method: 'POST',
    	      credentials: 'same-origin'
    	    });
    	  } catch (e) {
    	  }

    	  this.clearMemberState();
    	  this.memberDropdownOpen = false;
    	  this.loadRememberedLogin();
    	},

      async resendVerification() {
        this.loginMessage = '';
        this.loginSuccessMessage = '';

        if (!this.loginForm.memberEmail) {
          this.loginMessage = '請先輸入會員信箱';
          return;
        }

        this.resending = true;

        try {
          const res = await fetch('/api/member/resend-verification', {
            method: 'POST',
            headers: {
              'Content-Type': 'application/json'
            },
            credentials: 'same-origin',
            body: JSON.stringify({
              memberEmail: this.loginForm.memberEmail
            })
          });

          const data = await res.json().catch(function () {
            return {};
          });

          if (!res.ok) {
            this.loginMessage = data.error || '驗證信重送失敗';
            return;
          }

          this.loginSuccessMessage = data.message || '驗證信已重新寄出，請到信箱收信';
          this.showResendVerify = false;
        } catch (e) {
          this.loginMessage = '無法連線到伺服器';
        } finally {
          this.resending = false;
        }
      },
      clearNotificationState() {
    	  this.notificationPanelOpen = false;
    	  this.notifications = [];
    	  this.notificationUnreadCount = 0;
    	  this.notificationLoading = false;
    	  this.hasNotify = false;
    	},

    	startNotificationPolling() {
    	  this.stopNotificationPolling();

    	  this.notificationTimer = window.setInterval(
    	    () => {
    	      if (this.loggedIn) {
    	        this.loadNotifications();
    	      }
    	    },
    	    30000
    	  );
    	},

    	stopNotificationPolling() {
    	  if (this.notificationTimer !== null) {
    	    window.clearInterval(
    	      this.notificationTimer
    	    );

    	    this.notificationTimer = null;
    	  }
    	},

    	async toggleNotificationPanel() {
    	  if (!this.authReady) {
    	    return;
    	  }

    	  if (!this.loggedIn) {
    	    this.openLoginModal();
    	    return;
    	  }

    	  this.memberDropdownOpen = false;

    	  this.notificationPanelOpen =
    	    !this.notificationPanelOpen;

    	  if (this.notificationPanelOpen) {
    	    await this.loadNotifications();
    	  }
    	},

    	async loadNotifications() {
    	  if (!this.loggedIn) {
    	    this.clearNotificationState();
    	    return;
    	  }

    	  if (this.notifications.length === 0) {
    	    this.notificationLoading = true;
    	  }

    	  try {
    	    const res = await fetch(
    	      '/api/member/notifications',
    	      {
    	        credentials: 'same-origin',
    	        headers: {
    	          Accept: 'application/json'
    	        }
    	      }
    	    );

    	    if (res.status === 401) {
    	      this.clearMemberState();
    	      return;
    	    }

    	    if (!res.ok) {
    	      throw new Error('通知讀取失敗');
    	    }

    	    const data = await res.json();

    	    this.notifications =
    	      Array.isArray(data.notifications)
    	        ? data.notifications
    	        : [];

    	    this.notificationUnreadCount =
    	      Number(data.unreadCount || 0);

    	    this.hasNotify =
    	      this.notificationUnreadCount > 0;

    	  } catch (error) {
    	    console.error(
    	      '通知讀取失敗',
    	      error
    	    );

    	  } finally {
    	    this.notificationLoading = false;
    	  }
    	},

    	async markAllNotificationsAsRead() {
    	  if (!this.loggedIn) {
    	    return;
    	  }

    	  try {
    	    const res = await fetch(
    	      '/api/member/notifications/read-all',
    	      {
    	        method: 'POST',
    	        credentials: 'same-origin'
    	      }
    	    );

    	    if (!res.ok) {
    	      throw new Error('全部已讀更新失敗');
    	    }

    	    await this.loadNotifications();

    	  } catch (error) {
    	    console.error(
    	      '全部已讀更新失敗',
    	      error
    	    );
    	  }
    	},

    	async openNotification(notification) {
    	  const isUnread =
    	    Number(notification.isRead) === 0;

    	  if (isUnread) {
    	    try {
    	      const res = await fetch(
    	        `/api/member/notifications/${notification.memberNotifyId}/read`,
    	        {
    	          method: 'POST',
    	          credentials: 'same-origin'
    	        }
    	      );

    	      if (res.ok) {
    	        notification.isRead = 1;

    	        this.notificationUnreadCount =
    	          Math.max(
    	            0,
    	            this.notificationUnreadCount - 1
    	          );

    	        this.hasNotify =
    	          this.notificationUnreadCount > 0;
    	      }

    	    } catch (error) {
    	      console.error(
    	        '通知已讀更新失敗',
    	        error
    	      );
    	    }
    	  }

    	  const content =
    	    String(notification.content || '');

    	  if (
    	    content.includes('優惠券')
    	    || content.includes('新會員註冊禮')
    	    || content.includes('生日券')
    	  ) {
    	    location.href = '/coupons.html';
    	    return;
    	  }
    	  
    	  if (content.includes('購物訂單')) {
    		  location.href = '/shop/order/myOrders';
    		  return;
    		}

    	  await this.loadNotifications();
    	},

    	formatNotificationTime(value) {				// 日期格式化
    	  if (!value) {
    	    return '';
    	  }

    	  const date = new Date(value);

    	  if (Number.isNaN(date.getTime())) {
    	    return value;
    	  }

    	  return new Intl.DateTimeFormat(
    	    'zh-TW',
    	    {
    	      year: 'numeric',
    	      month: '2-digit',
    	      day: '2-digit',
    	      hour: '2-digit',
    	      minute: '2-digit',
    	      hour12: false
    	    }
    	  ).format(date);
    	},
      featureComingSoon(featureName) {
        alert(featureName + '尚未完成');
      },
    	
        toggleFaq(index) {
            this.faqActiveIndex = (this.faqActiveIndex === index) ? null : index;
        }
    	
    }
  }).mount('#app');
</script>
</body>
</html>
