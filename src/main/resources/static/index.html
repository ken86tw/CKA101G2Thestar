<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>東方之星 The Star｜首頁</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@500;700&family=Noto+Sans+TC:wght@300;400;500;700&family=Cormorant+Garamond:ital,wght@1,400;1,600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/common.css">
  <link rel="stylesheet" href="/css/index.css">
  <link rel="stylesheet" href="/css/facilities.css">
  <style>
    [v-cloak] {
      display: none;
    }

    .login-btn-as-button {
      border: 0;
      cursor: pointer;
      font: inherit;
    }

    .login-modal-mask {
      position: fixed;
      inset: 0;
      z-index: 999;
      background: rgba(20, 18, 14, 0.46);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .login-modal {
      width: min(420px, 92vw);
      background: #fffdf8;
      border: 1px solid #e5dccd;
      box-shadow: 0 20px 60px rgba(35, 33, 28, 0.2);
      padding: 36px;
      position: relative;
    }

    .login-modal-close {
      position: absolute;
      top: 14px;
      right: 14px;
      width: 34px;
      height: 34px;
      border: 0;
      border-radius: 50%;
      background: #f5efe5;
      color: #7f623b;
      cursor: pointer;
      font-size: 18px;
    }

    .login-modal h2 {
      margin: 0 0 8px;
      text-align: center;
      letter-spacing: 4px;
      color: #3a3329;
    }

    .login-modal-subtitle {
      margin: 0 0 28px;
      text-align: center;
      color: #8a8172;
      font-size: 14px;
    }

    .login-field {
      margin-bottom: 18px;
    }

    .login-field label {
      display: block;
      margin-bottom: 8px;
      font-size: 13px;
      color: #8a8172;
    }

    .login-field input {
      width: 100%;
      border: 1px solid #ddd4c6;
      background: #fff;
      padding: 13px 14px;
      font-size: 15px;
      border-radius: 4px;
      box-sizing: border-box;
    }

    .login-submit {
      width: 100%;
      border: 0;
      background: #9c7c4f;
      color: #fff;
      padding: 14px;
      font-size: 15px;
      letter-spacing: 2px;
      cursor: pointer;
    }

    .login-submit:disabled {
      opacity: 0.65;
      cursor: not-allowed;
    }

    .login-message {
      min-height: 22px;
      margin-top: 16px;
      text-align: center;
      color: #a85b50;
      font-size: 14px;
    }

    .login-modal-register {
      display: block;
      margin-top: 12px;
      text-align: center;
      color: #9c7c4f;
      font-weight: 700;
    }

    .login-remember {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      margin: -4px 0 18px;
      color: #7f6b50;
      font-size: 14px;
      cursor: pointer;
    }

    .login-remember input {
      width: 16px;
      height: 16px;
      accent-color: #9c7c4f;
    }


    .login-resend-box {
      margin-top: 14px;
      padding: 14px 16px;
      border: 1px solid #eadbc6;
      background: #fff9ef;
      text-align: center;
      color: #8a6b40;
      font-size: 14px;
    }

    .login-resend-box p {
      margin: 0 0 10px;
    }

    .login-resend-btn {
      width: 100%;
      border: 1px solid #b08b55;
      background: #fffdf8;
      color: #9c7c4f;
      padding: 10px 12px;
      font-weight: 700;
      cursor: pointer;
    }

    .login-resend-btn:disabled {
      opacity: 0.65;
      cursor: not-allowed;
    }

    .login-success-message {
      min-height: 22px;
      margin-top: 12px;
      text-align: center;
      color: #4f8a57;
      font-size: 14px;
    }

    .login-modal-links {
      margin-top: 18px;
      text-align: center;
      line-height: 1.9;
      color: #8a8172;
      font-size: 14px;
    }

    .login-modal-links a {
      margin-left: 8px;
      color: #9c7c4f;
      font-weight: 700;
      text-decoration: none;
    }

    .login-modal-links a:hover {
      text-decoration: underline;
    }

  </style>
</head>
<body>
<div id="app" v-cloak>
  <header :class="currentPage === 'home' ? 'hero' : 'page-header'" id="home">
    <nav class="navbar">
        <a href="#"
		   class="navbar-brand"
		   @click.prevent="goPage('home')">
		  <span class="brand-zh">東方之星</span>
		  <span class="brand-en">The Star</span>
		</a>

      <div class="nav-links">
        <a href="#" :class="{ active: currentPage === 'home' }" @click.prevent="goPage('home')">首頁</a>
        <a href="#" @click.prevent="goHomeAnchor('about-preview')">關於我們</a>
        <a href="/articles.html">文章</a>
        <a href="/roombooking.html">訂房</a>
        <a href="/restaurant">餐廳</a>
        <a href="#" :class="{ active: currentPage === 'facilities' }" @click.prevent="goPage('facilities')">設施</a>
        <a href="#" @click.prevent="goHomeAnchor('faq')">FAQ</a>
        <a href="/shop">購物</a>

		   class="cart-link"
		   title="購物車"
		   aria-label="購物車">
		  <i class="fa-solid fa-cart-shopping"></i>
		</a>

        <div class="nav-actions">
          <button class="notify-btn" type="button" title="通知" @click="notifyComingSoon">
            <i class="fa-regular fa-bell"></i>
            <span class="notify-dot" v-show="hasNotify"></span>
          </button>

          <button v-if="authReady && !loggedIn" type="button" class="login-btn login-btn-as-button" @click="openLoginModal">登入</button>

          <div v-else-if="authReady" class="member-menu">
            <button class="member-avatar" type="button" :title="displayName" @click.stop="toggleMemberMenu">
              <i class="fa-regular fa-user"></i>
            </button>

            <div class="member-dropdown" :class="{ show: memberDropdownOpen }" @click.stop>
			  <div class="member-greeting">貴賓，{{ displayName }}</div>
			  <a href="/profile.html">我的會員資料</a>
			  <a href="/roombooking.html?tab=orders">我的訂房預訂 </a>
			  <a href="#" @click.prevent="featureComingSoon('我的餐廳預訂')">我的餐廳預訂</a>
			  <a href="#" @click.prevent="featureComingSoon('我的購物訂單')">我的購物訂單</a>
			  <a href="#" @click.prevent="featureComingSoon('我的優惠券')">我的優惠券</a>
			  <button type="button" @click="logoutMember">登出</button>
			</div>
          </div>
        </div>
      </div>
    </nav>

    <div class="hero-content" v-if="currentPage === 'home'">

  <div class="login-modal-mask" v-if="loginModalOpen" @click.self="closeLoginModal">

      <button class="login-modal-close" type="button" @click="closeLoginModal">×</button>
      <h2>會員登入</h2>
      <p class="login-modal-subtitle">東方之星 The Star</p>

      <form @submit.prevent="loginMember" autocomplete="on">
        <div class="login-field">
          <label for="loginEmail">會員信箱</label>
          <input id="loginEmail" type="email" v-model.trim="loginForm.memberEmail" autocomplete="username" required>
        </div>

        <div class="login-field">
          <label for="loginPassword">會員密碼</label>
          <input id="loginPassword" type="password" v-model="loginForm.memberPassword" autocomplete="current-password" required>
        </div>

        <label class="login-remember">
          <input type="checkbox" v-model="loginForm.rememberMe">
          <span>記住我</span>
        </label>

        <button class="login-submit" type="submit" :disabled="loginLoading">
          {{ loginLoading ? '登入中...' : '登入' }}
        </button>

        <div class="login-message">{{ loginMessage }}</div>

        <div v-if="showResendVerify" class="login-resend-box">
          <p>這個帳號還沒完成信箱驗證。</p>
          <button type="button" class="login-resend-btn" :disabled="resending" @click="resendVerification">
            {{ resending ? '寄送中...' : '重送驗證信' }}
          </button>
        </div>

        <div class="login-success-message">{{ loginSuccessMessage }}</div>
      </form>

        <div>還沒有帳號 <a href="/register.html">註冊會員</a></div>

    </section>

<script src="https://unpkg.com/vue@3/dist/vue.global.prod.js"></script>
<script>
  const { createApp, nextTick } = Vue;

  createApp({
    data() {
      return {
        currentPage: 'home',
        loggedIn: false,
        authReady: false,
        memberId: null,
        memberName: '',
        memberEmail: '',
        memberDropdownOpen: false,
        hasNotify: false,
        loginModalOpen: false,
        loginLoading: false,
        resending: false,
        loginMessage: '',
        loginSuccessMessage: '',
        showResendVerify: false,
        loginForm: {
          memberEmail: '',
          memberPassword: '',
          rememberMe: false
        }
      };
    },

    computed: {
      displayName() {
        return this.memberName || '會員';
      }
    },

    mounted() {
      this.cleanIndexUrl();
      this.loadRememberedLogin();
      this.checkMemberStatus();

      document.addEventListener('click', () => {
        this.memberDropdownOpen = false;
      });
    },

    methods: {
      cleanIndexUrl() {
        if (location.pathname === '/index.html') {
          history.replaceState(null, '', '/');
        }
      },

      keepRootUrl() {
        if (location.pathname !== '/') {
          history.replaceState(null, '', '/');
        }
      },

      goPage(page) {
        this.currentPage = page;
        this.memberDropdownOpen = false;
        this.keepRootUrl();

        nextTick(function () {
          window.scrollTo({
            top: 0,
            behavior: 'smooth'
          });
        });
      },

      goHomeAnchor(anchorId) {
        this.currentPage = 'home';
        this.memberDropdownOpen = false;
        this.keepRootUrl();

        nextTick(function () {
          const target = document.getElementById(anchorId);

          if (target) {
            target.scrollIntoView({
              behavior: 'smooth'
            });
          }
        });
      },

      loadRememberedLogin() {
        const rememberedEmail = localStorage.getItem('theStarRememberEmail') || '';
        const rememberedPassword = localStorage.getItem('theStarRememberPassword') || '';

        this.loginForm.memberEmail = rememberedEmail;
        this.loginForm.memberPassword = rememberedPassword;
        this.loginForm.rememberMe = rememberedEmail !== '' && rememberedPassword !== '';
      },

      clearLoginMessages() {
        this.loginMessage = '';
        this.loginSuccessMessage = '';
        this.showResendVerify = false;
      },

      resetLoginFormForOpen() {
        this.loadRememberedLogin();
        this.clearLoginMessages();
      },

      async checkMemberStatus() {
        try {
          const res = await fetch('/api/member/status', {
            credentials: 'same-origin'
          });

          if (!res.ok) {
            this.clearMemberState();
            return;
          }

          const data = await res.json();

          this.loggedIn = data.loggedIn === true;
          this.memberId = data.memberId || null;
          this.memberName = data.memberName || '';
          this.memberEmail = data.memberEmail || '';

        } catch (e) {
          this.clearMemberState();
        } finally {
          this.authReady = true;
        }
      },

      clearMemberState() {
        this.loggedIn = false;
        this.memberId = null;
        this.memberName = '';
        this.memberEmail = '';
        this.memberDropdownOpen = false;
      },

      toggleMemberMenu(event) {
        event.stopPropagation();
        this.memberDropdownOpen = !this.memberDropdownOpen;
      },

      openLoginModal() {
        this.resetLoginFormForOpen();
        this.loginModalOpen = true;
        this.memberDropdownOpen = false;
      },

      closeLoginModal() {
        if (this.loginLoading) {
          return;
        }

        this.loginModalOpen = false;
        this.clearLoginMessages();
        this.loginForm.memberPassword = '';
      },

      async loginMember() {
        this.loginLoading = true;
        this.loginMessage = '';

        try {
          const res = await fetch('/api/member/login', {
            method: 'POST',
            headers: {
              'Content-Type': 'application/json'
            },
            credentials: 'same-origin',
            body: JSON.stringify({
              memberEmail: this.loginForm.memberEmail,
              memberPassword: this.loginForm.memberPassword
            })
          });

          const data = await res.json().catch(function () {
            return {};
          });

          if (!res.ok) {
            this.loginMessage = data.error || '登入失敗';
            this.showResendVerify = this.loginMessage.includes('帳號尚未完成信箱驗證');
            return;
          }

          if (this.loginForm.rememberMe) {
            localStorage.setItem('theStarRememberEmail', this.loginForm.memberEmail);
            localStorage.setItem('theStarRememberPassword', this.loginForm.memberPassword);
          } else {
            localStorage.removeItem('theStarRememberEmail');
            localStorage.removeItem('theStarRememberPassword');
          }

          this.loggedIn = true;
          this.memberId = data.memberId || null;
          this.memberName = data.memberName || '';
          this.memberEmail = data.memberEmail || '';
          this.loginModalOpen = false;
          this.clearLoginMessages();
          this.keepRootUrl();

        } catch (e) {
          this.loginMessage = '無法連線到伺服器';

        } finally {
          this.loginLoading = false;
        }
      },

      async logoutMember() {
    	  try {
    	    await fetch('/api/member/logout', {
    	      method: 'POST',
    	      credentials: 'same-origin'
    	    });
    	  } catch (e) {
    	  }

    	  this.clearMemberState();
    	  this.memberDropdownOpen = false;
    	  this.loadRememberedLogin();
    	},

      async resendVerification() {
        this.loginMessage = '';
        this.loginSuccessMessage = '';

        if (!this.loginForm.memberEmail) {
          this.loginMessage = '請先輸入會員信箱';
          return;
        }

        this.resending = true;

        try {
          const res = await fetch('/api/member/resend-verification', {
            method: 'POST',
            headers: {
              'Content-Type': 'application/json'
            },
            credentials: 'same-origin',
            body: JSON.stringify({
              memberEmail: this.loginForm.memberEmail
            })
          });

          const data = await res.json().catch(function () {
            return {};
          });

          if (!res.ok) {
            this.loginMessage = data.error || '驗證信重送失敗';
            return;
          }

          this.loginSuccessMessage = data.message || '驗證信已重新寄出，請到信箱收信';
          this.showResendVerify = false;
        } catch (e) {
          this.loginMessage = '無法連線到伺服器';
        } finally {
          this.resending = false;
        }
      },

      notifyComingSoon() {
        alert('通知功能尚未完成');
      },

      featureComingSoon(featureName) {
        alert(featureName + '尚未完成');
      }
    }
  }).mount('#app');
</script>
</body>
</html>
